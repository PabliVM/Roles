<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Departamento de Formación — Roles y Tareas</title>
<style>
/* === VARIABLES CORPORATIVAS === */
:root{
  --bg:#f0f2f5; --surface:#ffffff; --surface-alt:#fafbfc;
  --border:#dfe1e6; --border-light:#eaecf0;
  --text:#1a1d23; --text-sec:#5a6170; --text-mut:#8b919e; --text-faint:#b4b9c4;
  --rm-blue:#2563eb; --rm-blue-lt:#3b7cf5; --rm-blue-bg:#edf1fc;
  --green:#16a34a; --orange:#ea580c; --red:#dc2626;
  --sh-sm:0 1px 3px rgba(0,0,0,.06); --sh-md:0 2px 8px rgba(0,0,0,.08); --sh-lg:0 4px 16px rgba(0,0,0,.12);
  --r:8px; --rs:5px; --rl:12px;
  --font:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif; --tr:.2s ease;
}
body.dark{
  --bg:#1a1d23; --surface:#23272f; --surface-alt:#2a2e36;
  --border:#3a3f4a; --border-light:#32363e;
  --text:#e4e6ea; --text-sec:#a0a5b0; --text-mut:#707580; --text-faint:#505560;
  --rm-blue-bg:#1e2a4a;
  --sh-sm:0 1px 3px rgba(0,0,0,.2); --sh-md:0 2px 8px rgba(0,0,0,.3); --sh-lg:0 4px 16px rgba(0,0,0,.4);
}
*{ margin:0; padding:0; box-sizing:border-box; }
body{ font-family:var(--font); background:var(--bg); color:var(--text); line-height:1.45; font-size:13px; -webkit-font-smoothing:antialiased; padding-bottom:54px; }

/* === SPLASH === */
#splash{
  position:fixed; inset:0; background:var(--rm-blue);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:20px; z-index:9999; transition:opacity .4s ease;
}
#splash.hiding{ opacity:0; pointer-events:none; }
.splash-logo{ width:70px; height:70px; border-radius:50%; background:#fff; padding:8px; }
.splash-logo img{ width:100%; height:100%; object-fit:contain; }
.splash-title{ font-size:20px; font-weight:700; color:#fff; letter-spacing:-.3px; }
.splash-sub{ font-size:13px; color:rgba(255,255,255,.65); }
.splash-spinner{
  width:32px; height:32px; border:3px solid rgba(255,255,255,.3);
  border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite;
}
@keyframes spin{ to{ transform:rotate(360deg); } }
.splash-msg{ font-size:12px; color:rgba(255,255,255,.5); }

/* === HEADER === */
.header{ background:var(--rm-blue); padding:12px 24px; display:flex; align-items:center; gap:14px; position:sticky; top:0; z-index:200; box-shadow:0 2px 8px rgba(0,0,0,.15); }
.header-logo{ width:38px; height:38px; border-radius:50%; background:#fff; display:flex; align-items:center; justify-content:center; flex-shrink:0; overflow:hidden; padding:3px; cursor:pointer; }
.header-logo img{ width:100%; height:100%; object-fit:contain; }
.header-title-wrap{ display:flex; align-items:baseline; gap:10px; min-width:0; flex:1; }
.doc-title{ font-size:17px; font-weight:700; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; letter-spacing:-.3px; cursor:pointer; }
.doc-title:hover{ opacity:.85; }
.doc-breadcrumb{ font-size:13px; color:rgba(255,255,255,.6); white-space:nowrap; display:flex; align-items:center; gap:6px; }
.doc-breadcrumb .sep{ opacity:.4; }
.doc-breadcrumb .crumb{ cursor:pointer; }
.doc-breadcrumb .crumb:hover{ color:rgba(255,255,255,.9); }
.doc-breadcrumb .crumb-active{ color:rgba(255,255,255,.9); font-weight:600; }
.header-actions{ display:flex; align-items:center; gap:8px; flex-shrink:0; }
.btn-icon{ width:30px; height:30px; border-radius:50%; border:1px solid rgba(255,255,255,.2); background:rgba(255,255,255,.12); color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:15px; transition:all var(--tr); }
.btn-icon:hover{ background:rgba(255,255,255,.25); }
.btn-save{ padding:5px 14px; border-radius:20px; border:1px solid rgba(255,255,255,.3); background:rgba(255,255,255,.15); color:#fff; font-size:12px; font-weight:600; cursor:pointer; transition:all var(--tr); display:flex; align-items:center; gap:6px; }
.btn-save:hover{ background:rgba(255,255,255,.28); }
.save-dot{ width:7px; height:7px; border-radius:50%; background:#4ade80; flex-shrink:0; }
.save-dot.saving{ background:#fbbf24; animation:pulse .8s infinite; }
@keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:.4} }

/* === TOOLBAR (kanban) === */
.toolbar{ background:var(--surface); border-bottom:1px solid var(--border); padding:8px 24px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.btn{ padding:5px 14px; border-radius:6px; border:1px solid var(--border); background:var(--surface); color:var(--text); font-size:12px; font-weight:500; cursor:pointer; transition:all var(--tr); display:flex; align-items:center; gap:5px; }
.btn:hover{ background:var(--surface-alt); border-color:var(--rm-blue); color:var(--rm-blue); }
.btn-primary{ background:var(--rm-blue); color:#fff; border-color:var(--rm-blue); }
.btn-primary:hover{ background:var(--rm-blue-lt); color:#fff; border-color:var(--rm-blue-lt); }
.btn-ghost{ border-color:var(--orange); color:var(--orange); }
.btn-ghost:hover{ background:#fff7ed; }
body.dark .btn-ghost:hover{ background:#2a1f10; }
.toolbar-sep{ width:1px; height:20px; background:var(--border); }
.view-toggle{ display:flex; border:1px solid var(--border); border-radius:6px; overflow:hidden; }
.view-toggle button{ padding:4px 12px; font-size:12px; border:none; background:var(--surface); color:var(--text-sec); cursor:pointer; transition:all var(--tr); }
.view-toggle button.active{ background:var(--rm-blue); color:#fff; }
.search-box{ flex:1; min-width:140px; max-width:220px; padding:5px 10px; border-radius:6px; border:1px solid var(--border); background:var(--surface-alt); color:var(--text); font-size:12px; }
.search-box:focus{ outline:none; border-color:var(--rm-blue); }
.filter-sel{ padding:5px 10px; border-radius:6px; border:1px solid var(--border); background:var(--surface-alt); color:var(--text); font-size:12px; cursor:pointer; max-width:150px; }
.filter-sel.active{ border-color:var(--rm-blue); color:var(--rm-blue); font-weight:600; }

/* === HOME SCREEN === */
#homeScreen{ display:none; }
#homeScreen.active{ display:block; }
.home-main{ max-width:1100px; margin:0 auto; padding:28px 24px; }
.home-season-bar{
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:24px; flex-wrap:wrap; gap:12px;
}
.season-tabs{ display:flex; gap:6px; flex-wrap:wrap; }
.season-tab{
  padding:5px 10px 5px 16px; border-radius:20px;
  border:1px solid var(--border); background:var(--surface);
  font-size:12px; font-weight:600; cursor:pointer;
  color:var(--text-sec); transition:all var(--tr);
  display:flex; align-items:center; gap:6px;
}
.season-tab:hover{ border-color:var(--rm-blue); color:var(--rm-blue); }
.season-tab.active{ background:var(--rm-blue); color:#fff; border-color:var(--rm-blue); }
.season-tab-del{
  width:16px; height:16px; border-radius:50%;
  border:none; background:rgba(0,0,0,.12); color:inherit;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:12px; line-height:1; padding:0; flex-shrink:0;
  transition:all var(--tr);
}
.season-tab.active .season-tab-del{ background:rgba(255,255,255,.25); color:#fff; }
.season-tab-del:hover{ background:var(--red) !important; color:#fff !important; }
.home-boards-grid{
  display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
  gap:16px;
}
.board-card{
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--rl); padding:20px;
  cursor:pointer; transition:all var(--tr);
  box-shadow:var(--sh-sm);
  position:relative; overflow:hidden;
}
.board-card:hover{ box-shadow:var(--sh-md); border-color:var(--rm-blue); transform:translateY(-2px); }
.board-card-stripe{ position:absolute; top:0; left:0; right:0; height:4px; }
.board-card-top{ display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:10px; }
.board-card-name{ font-size:15px; font-weight:700; color:var(--text); line-height:1.3; }
.board-card-desc{ font-size:12px; color:var(--text-sec); margin-bottom:14px; line-height:1.4; }
.board-card-meta{ display:flex; align-items:center; gap:12px; }
.board-card-stat{ font-size:11px; color:var(--text-mut); display:flex; align-items:center; gap:4px; }
.board-card-actions{ display:flex; gap:4px; }
.icon-btn{ width:26px; height:26px; border-radius:6px; border:1px solid var(--border); background:transparent; color:var(--text-sec); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:12px; transition:all var(--tr); }
.icon-btn:hover{ background:var(--surface-alt); }
.icon-btn.del:hover{ background:#fef2f2; color:var(--red); border-color:var(--red); }
.board-card-new{
  border:2px dashed var(--border); background:transparent;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:8px; min-height:140px; color:var(--text-mut);
  font-size:13px;
}
.board-card-new:hover{ border-color:var(--rm-blue); color:var(--rm-blue); background:var(--rm-blue-bg); }
.board-card-new .big-plus{ font-size:28px; }
.home-empty{ text-align:center; padding:60px 20px; color:var(--text-mut); }
.home-empty-icon{ font-size:48px; margin-bottom:14px; }
.home-section-label{ font-size:11px; font-weight:700; color:var(--text-sec); text-transform:uppercase; letter-spacing:.6px; margin-bottom:14px; }

/* === KANBAN SCREEN === */
#kanbanScreen{ display:none; }
#kanbanScreen.active{ display:block; }
.k-main{ max-width:1700px; margin:0 auto; padding:16px 24px; }
.board{ display:flex; gap:16px; align-items:flex-start; overflow-x:auto; padding-bottom:16px; }
.column{ min-width:175px; width:175px; flex-shrink:0; }
.col-header{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; padding:0 2px; }
.col-title{ font-size:13px; font-weight:700; color:var(--text); display:flex; align-items:center; gap:7px; }
.col-dot{ width:10px; height:10px; border-radius:50%; }
.col-count{ font-size:11px; font-weight:600; background:var(--surface-alt); border:1px solid var(--border); color:var(--text-sec); border-radius:20px; padding:1px 7px; }
.col-add{ width:24px; height:24px; border-radius:50%; border:1px solid var(--border); background:transparent; color:var(--text-sec); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; transition:all var(--tr); }
.col-add:hover{ background:var(--rm-blue); color:#fff; border-color:var(--rm-blue); }
.drop-zone{ min-height:80px; display:flex; flex-direction:column; gap:8px; border-radius:var(--rl); padding:4px; transition:background .15s; }
.drop-zone.drag-over{ background:var(--rm-blue-bg); outline:2px dashed var(--rm-blue); }
.card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:12px; box-shadow:var(--sh-sm); cursor:grab; transition:box-shadow var(--tr),transform var(--tr); position:relative; overflow:hidden; }
.card:hover{ box-shadow:var(--sh-md); }
.card.dragging{ opacity:.5; transform:rotate(2deg); }
.card-stripe{ position:absolute; top:0; left:0; width:4px; height:100%; }
.card-top{ display:flex; align-items:flex-start; gap:8px; margin-bottom:6px; }
.card-title{ font-size:13px; font-weight:600; color:var(--text); flex:1; line-height:1.3; }
.card-role-badge{ font-size:10px; font-weight:700; padding:2px 7px; border-radius:20px; background:var(--rm-blue-bg); color:var(--rm-blue); white-space:nowrap; flex-shrink:0; }
.card-desc{ font-size:11.5px; color:var(--text-sec); line-height:1.4; margin-bottom:8px; }
.card-tags{ display:flex; gap:4px; flex-wrap:wrap; margin-bottom:8px; }
.tag{ font-size:10px; font-weight:600; padding:2px 7px; border-radius:20px; background:var(--surface-alt); color:var(--text-sec); border:1px solid var(--border-light); }
.card-footer{ display:flex; align-items:center; justify-content:space-between; border-top:1px solid var(--border-light); padding-top:7px; margin-top:4px; }
.card-person{ font-size:11px; color:var(--text-mut); display:flex; align-items:center; gap:4px; }
.avatar{ width:18px; height:18px; border-radius:50%; background:var(--rm-blue); color:#fff; font-size:9px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.card-actions{ display:flex; gap:4px; }
.card-btn{ width:22px; height:22px; border-radius:4px; border:1px solid var(--border); background:transparent; color:var(--text-sec); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:11px; transition:all var(--tr); }
.card-btn:hover{ background:var(--surface-alt); color:var(--text); }
.card-btn.del:hover{ background:#fef2f2; color:var(--red); border-color:var(--red); }
.col-new{ min-width:150px; width:150px; border:2px dashed var(--border); border-radius:var(--rl); display:flex; align-items:center; justify-content:center; padding:40px 20px; cursor:pointer; transition:all var(--tr); color:var(--text-mut); font-size:13px; flex-shrink:0; flex-direction:column; gap:8px; }
.col-new:hover{ border-color:var(--rm-blue); color:var(--rm-blue); background:var(--rm-blue-bg); }

/* === LIST VIEW === */
.list-view{ display:none; }
.list-table{ width:100%; border-collapse:collapse; background:var(--surface); border-radius:var(--rl); overflow:hidden; box-shadow:var(--sh-sm); }
.list-table th{ padding:10px 14px; text-align:left; font-size:11px; font-weight:700; color:var(--text-sec); text-transform:uppercase; letter-spacing:.5px; background:var(--surface-alt); border-bottom:1px solid var(--border); }
.list-table td{ padding:10px 14px; border-bottom:1px solid var(--border-light); font-size:12.5px; vertical-align:middle; }
.list-table tr:last-child td{ border-bottom:none; }
.list-table tr:hover td{ background:var(--surface-alt); }
.list-stripe{ display:inline-block; width:12px; height:12px; border-radius:3px; margin-right:6px; vertical-align:middle; }

/* === MODALS === */
.overlay{ display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:500; align-items:center; justify-content:center; }
.overlay.open{ display:flex; }
.modal{ background:var(--surface); border-radius:var(--rl); width:96%; max-width:520px; max-height:90vh; overflow-y:auto; box-shadow:var(--sh-lg); animation:modalIn .18s ease; }
@keyframes modalIn{ from{transform:scale(.95);opacity:0} to{transform:scale(1);opacity:1} }
.modal-sm{ max-width:400px; }
.modal-lg{ max-width:680px; }
.modal-header{ padding:18px 20px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.modal-title{ font-size:15px; font-weight:700; color:var(--text); display:flex; align-items:center; gap:8px; }
.modal-close{ width:28px; height:28px; border-radius:50%; border:1px solid var(--border); background:transparent; cursor:pointer; font-size:16px; color:var(--text-sec); display:flex; align-items:center; justify-content:center; transition:all var(--tr); }
.modal-close:hover{ background:var(--surface-alt); }
.modal-body{ padding:20px; display:flex; flex-direction:column; gap:14px; }
.modal-footer{ padding:14px 20px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:8px; }
.form-group{ display:flex; flex-direction:column; gap:5px; }
.form-label{ font-size:11.5px; font-weight:600; color:var(--text-sec); text-transform:uppercase; letter-spacing:.4px; }
.form-input,.form-select,.form-textarea{ padding:8px 12px; border-radius:6px; border:1px solid var(--border); background:var(--surface-alt); color:var(--text); font-size:13px; font-family:var(--font); transition:border-color var(--tr); }
.form-input:focus,.form-select:focus,.form-textarea:focus{ outline:none; border-color:var(--rm-blue); }
.form-textarea{ resize:vertical; min-height:80px; }
.form-row{ display:flex; gap:10px; }
.form-row .form-group{ flex:1; }
.color-grid{ display:flex; gap:7px; flex-wrap:wrap; }
.color-swatch{ width:28px; height:28px; border-radius:6px; cursor:pointer; border:2px solid transparent; transition:all var(--tr); }
.color-swatch.selected{ border-color:#1a1d23; transform:scale(1.15); }
body.dark .color-swatch.selected{ border-color:#fff; }

/* === PANEL CONFIGURACIÓN (slide-in) === */
.panel-overlay{ display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:600; }
.panel-overlay.open{ display:flex; align-items:flex-start; justify-content:flex-end; }
.panel{ background:var(--surface); width:100%; max-width:500px; height:100vh; overflow-y:auto; box-shadow:var(--sh-lg); animation:slideIn .22s ease; display:flex; flex-direction:column; }
@keyframes slideIn{ from{transform:translateX(100%)} to{transform:translateX(0)} }
.panel-header{ padding:18px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; position:sticky; top:0; background:var(--surface); z-index:10; }
.panel-header h2{ font-size:15px; font-weight:700; color:var(--text); flex:1; }
.panel-body{ padding:20px; flex:1; display:flex; flex-direction:column; gap:24px; }
.panel-section{ display:flex; flex-direction:column; gap:10px; }
.panel-section-title{ font-size:11px; font-weight:700; color:var(--text-sec); text-transform:uppercase; letter-spacing:.6px; display:flex; align-items:center; gap:6px; }
.maestro-list{ display:flex; flex-direction:column; gap:6px; }
.maestro-item{ display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:8px; background:var(--surface-alt); border:1px solid var(--border); }
.maestro-dot{ width:12px; height:12px; border-radius:50%; flex-shrink:0; background:var(--rm-blue); }
.maestro-name{ flex:1; font-size:13px; font-weight:500; color:var(--text); }
.maestro-sub{ font-size:11px; color:var(--text-mut); margin-left:4px; }
.maestro-count{ font-size:11px; color:var(--text-mut); background:var(--bg); padding:2px 7px; border-radius:20px; }
.maestro-del{ width:20px; height:20px; border:none; background:transparent; cursor:pointer; color:var(--text-mut); font-size:14px; display:flex; align-items:center; justify-content:center; border-radius:4px; transition:all var(--tr); }
.maestro-del:hover{ color:var(--red); background:#fef2f2; }
.add-row{ display:flex; gap:8px; align-items:center; }
.add-row .form-input{ flex:1; padding:7px 10px; font-size:12.5px; }
.add-btn{ padding:7px 14px; border-radius:6px; border:1px solid var(--rm-blue); background:var(--rm-blue); color:#fff; font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap; }
.add-btn:hover{ background:var(--rm-blue-lt); }
.color-mini{ display:flex; gap:5px; flex-wrap:wrap; }
.mini-sw{ width:20px; height:20px; border-radius:4px; cursor:pointer; border:2px solid transparent; transition:all var(--tr); }
.mini-sw.sel{ border-color:var(--text); transform:scale(1.2); }
.panel-empty{ text-align:center; padding:16px; color:var(--text-mut); font-size:12px; }

/* === TEMPORADA COPY OPTION === */
.copy-option{ display:flex; align-items:flex-start; gap:10px; padding:12px; border-radius:8px; border:1px solid var(--border); background:var(--surface-alt); cursor:pointer; transition:all var(--tr); }
.copy-option:hover{ border-color:var(--rm-blue); background:var(--rm-blue-bg); }
.copy-option input[type=checkbox]{ margin-top:2px; accent-color:var(--rm-blue); width:15px; height:15px; cursor:pointer; }
.copy-option-text strong{ display:block; font-size:13px; color:var(--text); margin-bottom:2px; }
.copy-option-text span{ font-size:11.5px; color:var(--text-sec); }

/* === TOAST === */
.toast-wrap{ position:fixed; bottom:64px; right:20px; display:flex; flex-direction:column; gap:8px; z-index:1000; }
.toast{ padding:10px 16px; border-radius:8px; font-size:12.5px; font-weight:500; color:#fff; box-shadow:var(--sh-md); animation:toastIn .2s ease; max-width:300px; }
.toast.ok{ background:#16a34a; }
.toast.err{ background:#dc2626; }
.toast.info{ background:var(--rm-blue); }
@keyframes toastIn{ from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }

/* === FOOTER === */
.app-footer{ background:var(--rm-blue); color:rgba(255,255,255,.5); font-size:10px; letter-spacing:.3px; text-align:center; padding:12px 24px; position:fixed; left:0; right:0; bottom:0; z-index:50; display:flex; align-items:center; justify-content:center; gap:10px; }
.footer-status{ color:rgba(255,255,255,.6); }

/* === MISC === */
.empty-state{ text-align:center; padding:40px 20px; color:var(--text-mut); }
body.dark .inline-confirm-banner{ background:#2a1010 !important; }
/* === DRAG & DROP ENHANCED === */
.card.drag-over-top::before,.card.drag-over-bottom::after{
  content:''; display:block; height:3px; border-radius:3px;
  background:var(--rm-blue); margin:2px 0;
}
.card.drag-over-top{ border-top:3px solid var(--rm-blue); }
.card.drag-over-bottom{ border-bottom:3px solid var(--rm-blue); }
.column.col-dragging{ opacity:.4; }
.column.col-drag-over{ outline:2px dashed var(--rm-blue); border-radius:var(--rl); background:var(--rm-blue-bg); }
.board-card.board-dragging{ opacity:.4; transform:rotate(1deg); }
.board-card.board-drag-over{ outline:2px dashed var(--rm-blue); transform:translateY(-4px); }
.col-header{ cursor:grab; }
.col-header:active{ cursor:grabbing; }
.col-drag-handle{ font-size:14px; color:var(--text-faint); cursor:grab; padding:0 4px; }
.col-drag-handle:hover{ color:var(--text-sec); }

<!-- ====== FIREBASE + APP ====== -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, getDocs, deleteDoc, doc, setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCkc2CT8lBWFqo94nlC4J3WIQb2Q3gVSfE",
  authDomain: "roles-3f4a0.firebaseapp.com",
  projectId: "roles-3f4a0",
  storageBucket: "roles-3f4a0.firebasestorage.app",
  messagingSenderId: "224811008593",
  appId: "1:224811008593:web:3fbd10854547905013ae70"
};

let db = null;

// =====================================================
// STATE — keyed by seasonId
// =====================================================
const COLORS = ["#2563eb","#7c3aed","#db2777","#dc2626","#ea580c","#d97706","#16a34a","#0891b2","#475569","#64748b"];

// Global state container
// state.seasons = [{id,name,order}]
// state.data[seasonId] = { boards:[{id,name,desc,color,order}], columns:[{id,boardId,name,color,order}], cards:[...], roles:[{id,name}], persons:[{id,name,role}], tags:[{id,name,color}] }
let state = { seasons: [], data: {} };
let activeSeason = null;  // season object
let activeBoard  = null;  // board object
let editingCardId = null, editingColId = null, editingBoardId = null;
let selectedColor = COLORS[0], selectedColColor = COLORS[6], selectedBoardColor = COLORS[0], selectedTagColor = COLORS[8];
let selectedCardTags = [];
let deleteTarget = null;
let currentView = 'board';
let searchQuery = '', filterArea = '', filterRole = '', filterPerson = '', filterTag = '';
let dragCardId = null, dragColId = null, dragBoardId = null, saveTimeout = null;

// Helpers to get season data
function sd() { return activeSeason ? (state.data[activeSeason.id] || emptySeasonData()) : emptySeasonData(); }
function emptySeasonData() { return { boards:[], columns:[], cards:[], roles:[], persons:[], tags:[] }; }
function ensureSD(sid) { if (!state.data[sid]) state.data[sid] = emptySeasonData(); return state.data[sid]; }

// =====================================================
// INIT
// =====================================================
window.addEventListener('DOMContentLoaded', async () => {
  initTagColorMini();
  try {
    await loadAll();
    renderApp();
  } catch(e) {
    showFirebaseError(e);
  }
});

// =====================================================
// LOAD — Firebase only, no fallback
// =====================================================
async function loadAll() {
  let app;
  try { app = initializeApp(firebaseConfig); }
  catch(e) { throw new Error("Error al inicializar Firebase: " + e.message); }
  db = getFirestore(app);
  const seasonSnap = await getDocs(collection(db, "seasons"));
  state.seasons = seasonSnap.docs.map(d => ({id:d.id,...d.data()})).sort((a,b)=>(a.order||0)-(b.order||0));
  for (const season of state.seasons) {
    const sid = season.id;
    const [boards,columns,cards,roles,persons,tags] = await Promise.all([
      getDocs(collection(db,`seasons/${sid}/boards`)),
      getDocs(collection(db,`seasons/${sid}/columns`)),
      getDocs(collection(db,`seasons/${sid}/cards`)),
      getDocs(collection(db,`seasons/${sid}/roles`)),
      getDocs(collection(db,`seasons/${sid}/persons`)),
      getDocs(collection(db,`seasons/${sid}/tags`)),
    ]);
    state.data[sid] = {
      boards:  boards.docs.map(d=>({id:d.id,...d.data()})),
      columns: columns.docs.map(d=>({id:d.id,...d.data()})),
      cards:   cards.docs.map(d=>({id:d.id,...d.data()})),
      roles:   roles.docs.map(d=>({id:d.id,...d.data()})),
      persons: persons.docs.map(d=>({id:d.id,...d.data()})),
      tags:    tags.docs.map(d=>({id:d.id,...d.data()})),
    };
  }
  activeSeason = state.seasons[0] || null;
  setFooterStatus("🔥 Firebase");
}

function showFirebaseError(e) {
  console.error("Firebase error:", e);
  document.body.innerHTML = `
    <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:#2563eb;font-family:'Segoe UI',sans-serif">
      <img src="https://raw.githubusercontent.com/PabliVM/PLANNING/main/assets/rm.png" style="width:64px;height:64px;border-radius:50%;background:#fff;padding:6px">
      <div style="font-size:18px;font-weight:700;color:#fff">Error de conexión</div>
      <div style="font-size:13px;color:rgba(255,255,255,.8);max-width:320px;text-align:center">${e?.message||'No se pudo conectar con Firebase'}</div>
      <button onclick="location.reload()" style="padding:10px 28px;border-radius:20px;border:2px solid rgba(255,255,255,.5);background:rgba(255,255,255,.15);color:#fff;font-size:13px;font-weight:600;cursor:pointer">↺ Reintentar</button>
    </div>`;
}

// =====================================================
// PERSIST — Firebase only
// =====================================================
function scheduleSave() {
  setSaveDot('saving','Guardando…');
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(persistAll, 1500);
}

async function persistAll() {
  try {
    for (const s of state.seasons) {
      const {id,...data} = s;
      await setDoc(doc(db,"seasons",id), data);
    }
    for (const [sid, sdata] of Object.entries(state.data)) {
      const colls = ['boards','columns','cards','roles','persons','tags'];
      for (const coll of colls) {
        for (const item of sdata[coll]||[]) {
          const {id,...data} = item;
          await setDoc(doc(db,`seasons/${sid}/${coll}`,id), data);
        }
      }
    }
    setSaveDot('ok','Guardado');
  } catch(e) {
    console.error("Firebase save error:", e);
    setSaveDot('error','Error al guardar');
    toast("❌ Error al guardar en Firebase","err");
  }
}

window.manualSave = async () => { setSaveDot('saving','Guardando…'); await persistAll(); };

// =====================================================
// ROUTING
// =====================================================
function renderApp() {
  document.getElementById('mainHeader').style.visibility = '';
  if (activeBoard) {
    showKanban();
  } else {
    showHome();
  }
}

function showHome() {
  activeBoard = null;
  document.getElementById('homeScreen').classList.add('active');
  document.getElementById('kanbanScreen').classList.remove('active');
  renderBreadcrumb();
  renderSeasonTabs();
  renderBoardsGrid();
}

function showKanban() {
  document.getElementById('homeScreen').classList.remove('active');
  document.getElementById('kanbanScreen').classList.add('active');
  renderBreadcrumb();
  renderKanban();
}

window.goHome = () => { activeBoard = null; showHome(); };
window.enterBoard = (boardId) => {
  const data = sd();
  activeBoard = data.boards.find(b => b.id === boardId);
  if (!activeBoard) return;
  currentView = 'board'; searchQuery = ''; filterArea = ''; filterRole = ''; filterPerson = ''; filterTag = '';
  showKanban();
};

// =====================================================
// BREADCRUMB
// =====================================================
function renderBreadcrumb() {
  const el = document.getElementById('breadcrumb');
  if (!activeSeason) { el.innerHTML=''; return; }
  if (!activeBoard) {
    el.innerHTML = `<span class="crumb crumb-active">${esc(activeSeason.name)}</span>`;
  } else {
    el.innerHTML = `<span class="crumb" onclick="goHome()">${esc(activeSeason.name)}</span><span class="sep">›</span><span class="crumb-active">${esc(activeBoard.name)}</span>`;
  }
}

// =====================================================
// HOME
// =====================================================
function renderSeasonTabs() {
  const tabs = document.getElementById('seasonTabs');
  tabs.innerHTML = '';
  [...state.seasons].sort((a,b)=>(a.order||0)-(b.order||0)).forEach(s => {
    const tab = document.createElement('div');
    tab.className = 'season-tab' + (s.id===activeSeason?.id?' active':'');
    // Name span (clickable to switch)
    const nameEl = document.createElement('span');
    nameEl.textContent = s.name;
    nameEl.onclick = () => {
      activeSeason = s;
      activeBoard = null;
      showHome();
    };
    tab.appendChild(nameEl);
    // Delete button
    const del = document.createElement('button');
    del.className = 'season-tab-del';
    del.innerHTML = '×';
    del.title = 'Eliminar temporada';
    del.style.display = 'none'; // delete only via config panel
    tab.appendChild(del);
    tabs.appendChild(tab);
  });
}

function renderBoardsGrid() {
  const grid = document.getElementById('boardsGrid');
  const label = document.getElementById('boardsLabel');
  const data = sd();
  const boards = [...data.boards].sort((a,b)=>(a.order||0)-(b.order||0));
  label.textContent = `Tableros de ${activeSeason?.name||''}`;
  grid.innerHTML = '';

  boards.forEach(b => {
    const cols = data.columns.filter(c=>c.boardId===b.id).length;
    const cards = data.cards.filter(c=>{
      const col = data.columns.find(col=>col.id===c.columnId);
      return col && col.boardId===b.id;
    }).length;

    const div = document.createElement('div');
    div.className = 'board-card';
    div.innerHTML = `
      <div class="board-card-stripe" style="background:${b.color||'#2563eb'}"></div>
      <div class="board-card-top">
        <div class="board-card-name">${esc(b.name)}</div>
        <div class="board-card-actions">
          <button class="icon-btn" onclick="event.stopPropagation();openBoardModal('${b.id}')" title="Editar">✏️</button>

        </div>
      </div>
      <div class="board-card-desc">${esc(b.desc||'Sin descripción')}</div>
      <div class="board-card-meta">
        <span class="board-card-stat">📋 ${cols} área${cols!==1?'s':''}</span>
        <span class="board-card-stat">🗂 ${cards} ficha${cards!==1?'s':''}</span>
      </div>`;
    div.draggable = true;
    div.dataset.boardId = b.id;
    div.ondragstart = e => onBoardDragStart(e, b.id);
    div.ondragend = onBoardDragEnd;
    div.ondragover = e => onBoardDragOver(e, b.id);
    div.ondragleave = e => onBoardDragLeave(e);
    div.ondrop = e => onBoardDrop(e, b.id);
    div.onclick = () => enterBoard(b.id);
    grid.appendChild(div);
  });

  // New board button
  const add = document.createElement('div');
  add.className = 'board-card board-card-new';
  add.innerHTML = `<div class="big-plus">＋</div><span>Nuevo tablero</span>`;
  add.onclick = openNewBoard;
  grid.appendChild(add);
}

// =====================================================
// KANBAN RENDER
// =====================================================
function renderKanban() {
  renderBoard();
  renderList();
  updateFilters();
}

function getBoardCards() {
  const data = sd();
  const boardColIds = new Set(data.columns.filter(c=>c.boardId===activeBoard?.id).map(c=>c.id));
  return data.cards.filter(c => boardColIds.has(c.columnId));
}

function getFilteredCards() {
  return getBoardCards().filter(c => {
    const q = searchQuery.toLowerCase();
    if (q && ![c.title,c.desc,c.person,c.role,...(c.tags||[])].some(x=>(x||'').toLowerCase().includes(q))) return false;
    if (filterArea   && c.columnId !== filterArea) return false;
    if (filterRole   && (c.role||'') !== filterRole) return false;
    if (filterPerson && (c.person||'') !== filterPerson) return false;
    if (filterTag    && !(c.tags||[]).includes(filterTag)) return false;
    return true;
  });
}

function renderBoard() {
  const board = document.getElementById('board');
  const data = sd();
  const filtered = getFilteredCards();
  const cols = data.columns.filter(c=>c.boardId===activeBoard?.id).sort((a,b)=>(a.order||0)-(b.order||0));
  board.innerHTML = '';

  cols.forEach(col => {
    const colCards = filtered.filter(c=>c.columnId===col.id).sort((a,b)=>(a.order||0)-(b.order||0));
    const colEl = document.createElement('div');
    colEl.className = 'column';
    colEl.draggable = true;
    colEl.dataset.colId = col.id;
    colEl.ondragstart = e => onColDragStart(e, col.id);
    colEl.ondragend = onColDragEnd;
    colEl.innerHTML = `
      <div class="col-header"
           ondragover="onColDragOver(event,'${col.id}')"
           ondragleave="onColDragLeave(event)"
           ondrop="onColDrop(event,'${col.id}')">
        <div class="col-title">
          <span class="col-drag-handle" title="Arrastrar para mover">⠿</span>
          <span class="col-dot" style="background:${col.color}"></span>${esc(col.name)}
        </div>
        <div style="display:flex;gap:5px;align-items:center">
          <span class="col-count">${colCards.length}</span>
          <button class="col-add" onclick="openCardModal('${col.id}')">＋</button>
          <button class="card-btn" onclick="openColModal('${col.id}')">✏️</button>
        </div>
      </div>
      <div class="drop-zone" id="zone-${col.id}"
        ondragover="onCardDragOver(event,'${col.id}')"
        ondragleave="onDragLeave(event)"
        ondrop="onCardDrop(event,'${col.id}')">
        ${colCards.length?'':'<div class="empty-state"><div class="empty-state-icon">📋</div><div class="empty-state-text">Sin fichas</div></div>'}
      </div>`;
    const zone = colEl.querySelector('.drop-zone');
    colCards.forEach(card => zone.appendChild(buildCard(card, col.color)));
    board.appendChild(colEl);
  });

  const addCol = document.createElement('div');
  addCol.className = 'col-new';
  addCol.onclick = () => openColModal();
  addCol.innerHTML = `<span style="font-size:22px">＋</span><span>Nueva área</span>`;
  board.appendChild(addCol);
}

function buildCard(card, colColor) {
  const el = document.createElement('div');
  el.className = 'card'; el.draggable = true; el.dataset.id = card.id;
  el.ondragstart = e => onCardDragStart(e, card.id);
  el.ondragend = onCardDragEnd;
  el.ondragover = e => onCardDragOverCard(e, card.id);
  el.ondragleave = e => onCardDragLeaveCard(e);
  const color = card.color||colColor||COLORS[0];
  const initials = (card.person||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
  const data = sd();
  const tags = (card.tags||[]).map(t => {
    const td = data.tags.find(x=>x.name===t);
    const tc = td?.color||'#64748b';
    return `<span class="tag" style="background:${tc}18;color:${tc};border-color:${tc}40">${esc(t)}</span>`;
  }).join('');
  el.innerHTML = `
    <div class="card-stripe" style="background:${color}"></div>
    <div class="card-top">
      <div class="card-title">${esc(card.title)}</div>
      ${card.role?`<span class="card-role-badge">${esc(card.role)}</span>`:''}
    </div>
    ${card.desc?`<div class="card-desc">${esc(card.desc)}</div>`:''}
    ${tags?`<div class="card-tags">${tags}</div>`:''}
    <div class="card-footer">
      <div class="card-person"><div class="avatar" style="background:${color}">${initials}</div>${esc(card.person||'Sin asignar')}</div>
      <div class="card-actions">
        <button class="card-btn" onclick="openCardModal(null,'${card.id}')">✏️</button>

      </div>
    </div>`;
  return el;
}

function renderList() {
  const tbody = document.getElementById('listBody');
  const data = sd();
  const filtered = getFilteredCards();
  const colMap = Object.fromEntries(data.columns.map(c=>[c.id,c]));
  tbody.innerHTML = '';
  if (!filtered.length) { tbody.innerHTML=`<tr><td colspan="6" style="text-align:center;padding:30px;color:var(--text-mut)">Sin resultados</td></tr>`; return; }
  filtered.forEach(card => {
    const col = colMap[card.columnId]||{};
    const color = card.color||col.color||'#888';
    const tags = (card.tags||[]).map(t=>{const td=data.tags.find(x=>x.name===t);const tc=td?.color||'#64748b';return `<span class="tag" style="background:${tc}18;color:${tc};border-color:${tc}40">${esc(t)}</span>`;}).join(' ');
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><span class="list-stripe" style="background:${color}"></span><strong>${esc(card.title)}</strong></td>
      <td>${esc(col.name||'—')}</td><td>${esc(card.role||'—')}</td><td>${esc(card.person||'—')}</td>
      <td>${tags||'<span style="color:var(--text-mut)">—</span>'}</td>
      <td><button class="card-btn" onclick="openCardModal(null,'${card.id}')">✏️</button></td>`;
    tbody.appendChild(tr);
  });
}

// ── CARDS ──────────────────────────────────────────
function onCardDragStart(e, id) {
  dragCardId = id;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.stopPropagation(); // don't trigger column drag
}
function onCardDragEnd(e) {
  dragCardId = null;
  document.querySelectorAll('.card').forEach(c => {
    c.classList.remove('dragging','drag-over-top','drag-over-bottom');
  });
  document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('drag-over'));
}
function onCardDragOverCard(e, targetCardId) {
  if (!dragCardId || dragCardId === targetCardId) return;
  e.preventDefault(); e.stopPropagation();
  const el = e.currentTarget;
  const rect = el.getBoundingClientRect();
  const mid = rect.top + rect.height / 2;
  document.querySelectorAll('.card').forEach(c => c.classList.remove('drag-over-top','drag-over-bottom'));
  el.classList.add(e.clientY < mid ? 'drag-over-top' : 'drag-over-bottom');
}
function onCardDragLeaveCard(e) {
  e.currentTarget.classList.remove('drag-over-top','drag-over-bottom');
}
function onCardDragOver(e, colId) {
  if (!dragCardId) return;
  e.preventDefault();
  document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('drag-over'));
  document.getElementById('zone-'+colId)?.classList.add('drag-over');
}
function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function onCardDrop(e, colId) {
  e.preventDefault();
  document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('drag-over'));
  document.querySelectorAll('.card').forEach(c => c.classList.remove('drag-over-top','drag-over-bottom'));
  if (!dragCardId) return;
  const d = sd();
  const card = d.cards.find(c => c.id === dragCardId);
  if (!card) { dragCardId = null; return; }
  // Dropped on zone empty space → move to end of column
  card.columnId = colId;
  // Re-order: put at end
  const colCards = d.cards.filter(c => c.columnId === colId && c.id !== dragCardId);
  colCards.push(card);
  colCards.forEach((c,i) => c.order = i);
  dragCardId = null;
  scheduleSave(); renderBoard();
}

// Drop ON another card (insert before/after)
document.addEventListener('drop', e => {
  if (!dragCardId) return;
  const targetCard = e.target.closest('.card');
  if (!targetCard || targetCard.dataset.id === dragCardId) return;
  e.preventDefault();
  const d = sd();
  const card = d.cards.find(c => c.id === dragCardId);
  const target = d.cards.find(c => c.id === targetCard.dataset.id);
  if (!card || !target) return;
  const rect = targetCard.getBoundingClientRect();
  const insertBefore = e.clientY < rect.top + rect.height / 2;
  card.columnId = target.columnId;
  // Reorder
  const colCards = d.cards.filter(c => c.columnId === target.columnId && c.id !== dragCardId);
  const targetIdx = colCards.findIndex(c => c.id === target.id);
  colCards.splice(insertBefore ? targetIdx : targetIdx + 1, 0, card);
  colCards.forEach((c,i) => c.order = i);
  dragCardId = null;
  scheduleSave(); renderBoard();
}, true);

// ── COLUMNS ────────────────────────────────────────
function onColDragStart(e, colId) {
  if (dragCardId) { e.preventDefault(); return; } // card takes priority
  dragColId = colId;
  setTimeout(() => e.currentTarget.classList.add('col-dragging'), 0);
  e.dataTransfer.effectAllowed = 'move';
}
function onColDragEnd(e) {
  dragColId = null;
  document.querySelectorAll('.column').forEach(c => c.classList.remove('col-dragging','col-drag-over'));
}
function onColDragOver(e, targetColId) {
  if (!dragColId || dragColId === targetColId) return;
  e.preventDefault(); e.stopPropagation();
  document.querySelectorAll('.column').forEach(c => c.classList.remove('col-drag-over'));
  // Find the column element for targetColId
  const targetEl = document.querySelector(`.column[data-col-id="${targetColId}"]`);
  targetEl?.classList.add('col-drag-over');
}
function onColDragLeave(e) {
  e.currentTarget.closest('.column')?.classList.remove('col-drag-over');
}
function onColDrop(e, targetColId) {
  e.preventDefault(); e.stopPropagation();
  document.querySelectorAll('.column').forEach(c => c.classList.remove('col-dragging','col-drag-over'));
  if (!dragColId || dragColId === targetColId) { dragColId = null; return; }
  const d = sd();
  const cols = d.columns.filter(c => c.boardId === activeBoard.id).sort((a,b)=>(a.order||0)-(b.order||0));
  const fromIdx = cols.findIndex(c => c.id === dragColId);
  const toIdx   = cols.findIndex(c => c.id === targetColId);
  if (fromIdx < 0 || toIdx < 0) { dragColId = null; return; }
  const [moved] = cols.splice(fromIdx, 1);
  cols.splice(toIdx, 0, moved);
  cols.forEach((c,i) => c.order = i);
  dragColId = null;
  scheduleSave(); renderBoard();
}

// ── BOARDS (home screen) ────────────────────────────
function onBoardDragStart(e, boardId) {
  dragBoardId = boardId;
  setTimeout(() => e.currentTarget.classList.add('board-dragging'), 0);
  e.dataTransfer.effectAllowed = 'move';
}
function onBoardDragEnd(e) {
  dragBoardId = null;
  document.querySelectorAll('.board-card').forEach(c => c.classList.remove('board-dragging','board-drag-over'));
}
function onBoardDragOver(e, targetBoardId) {
  if (!dragBoardId || dragBoardId === targetBoardId) return;
  e.preventDefault(); e.stopPropagation();
  document.querySelectorAll('.board-card').forEach(c => c.classList.remove('board-drag-over'));
  e.currentTarget.classList.add('board-drag-over');
}
function onBoardDragLeave(e) {
  e.currentTarget.classList.remove('board-drag-over');
}
function onBoardDrop(e, targetBoardId) {
  e.preventDefault();
  document.querySelectorAll('.board-card').forEach(c => c.classList.remove('board-dragging','board-drag-over'));
  if (!dragBoardId || dragBoardId === targetBoardId) { dragBoardId = null; return; }
  const d = sd();
  const boards = [...d.boards].sort((a,b)=>(a.order||0)-(b.order||0));
  const fromIdx = boards.findIndex(b => b.id === dragBoardId);
  const toIdx   = boards.findIndex(b => b.id === targetBoardId);
  if (fromIdx < 0 || toIdx < 0) { dragBoardId = null; return; }
  const [moved] = boards.splice(fromIdx, 1);
  boards.splice(toIdx, 0, moved);
  boards.forEach((b,i) => b.order = i);
  dragBoardId = null;
  scheduleSave(); renderBoardsGrid();
}

window.openCardModal = function(colId=null, cardId=null) {
  editingCardId=cardId; selectedColor=COLORS[0]; selectedCardTags=[];
  document.getElementById('cardModalTitle').textContent=cardId?'Editar ficha':'Nueva ficha';
  document.getElementById('cardDelBtn').style.display=cardId?'flex':'none';
  updateFilters();
  if(cardId){
    const card=sd().cards.find(c=>c.id===cardId); if(!card)return;
    document.getElementById('fTitle').value=card.title||'';
    document.getElementById('fDesc').value=card.desc||'';
    document.getElementById('fArea').value=card.columnId||'';
    document.getElementById('fRole').value=card.role||'';
    document.getElementById('fPerson').value=card.person||'';
    selectedCardTags=[...(card.tags||[])]; selectedColor=card.color||COLORS[0];
  } else {
    ['fTitle','fDesc'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('fRole').value=''; document.getElementById('fPerson').value='';
    if(colId)document.getElementById('fArea').value=colId;
  }
  renderTagCheckboxes(); renderColorGrid('colorGrid','card');
  document.getElementById('cardOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('fTitle').focus(),100);
};
window.closeCardModal=()=>document.getElementById('cardOverlay').classList.remove('open');
window.saveCard=function(){
  const title=document.getElementById('fTitle').value.trim();
  if(!title){toast("El título es obligatorio","err");return;}
  const d=sd();
  const payload={title,columnId:document.getElementById('fArea').value,role:document.getElementById('fRole').value,person:document.getElementById('fPerson').value,desc:document.getElementById('fDesc').value.trim(),tags:selectedCardTags,color:selectedColor};
  if(editingCardId){Object.assign(d.cards.find(c=>c.id===editingCardId),payload);}
  else{d.cards.push({id:uid(),...payload});}
  closeCardModal();scheduleSave();renderKanban();
  toast(editingCardId?"✅ Ficha actualizada":"✅ Ficha creada","ok");
};
window.deleteCurrentCard=function(){
  if(!editingCardId)return;
  showInlineConfirm('cardOverlay','card',editingCardId,'¿Eliminar esta ficha? Esta acción no se puede deshacer.');
};

function renderTagCheckboxes(){
  const wrap=document.getElementById('tagCheckboxes'); wrap.innerHTML='';
  const data=sd();
  if(!data.tags.length){wrap.innerHTML='<span style="color:var(--text-mut);font-size:12px">Añade etiquetas en ⚙ Configuración</span>';return;}
  data.tags.forEach(t=>{
    const sel=selectedCardTags.includes(t.name);
    const tc=t.color||'#64748b';
    const pill=document.createElement('div');
    pill.className='tag-pill';
    pill.style.cssText=`background:${sel?tc+'22':'var(--surface-alt)'};color:${sel?tc:'var(--text-sec)'};border-color:${sel?tc+'80':'var(--border)'};font-weight:${sel?'700':'500'}`;
    pill.innerHTML=`${sel?'✓ ':''}${esc(t.name)}`;
    pill.onclick=()=>{if(sel)selectedCardTags=selectedCardTags.filter(x=>x!==t.name);else selectedCardTags.push(t.name);renderTagCheckboxes();};
    wrap.appendChild(pill);
  });
}

window.openNewSeason=function(){
  document.getElementById('newSeasonName').value='';
  // Build copy options
  const opts=document.getElementById('copyOptions');
  opts.innerHTML='';
  if(state.seasons.length>0 && activeSeason){
    const wrap=document.createElement('div');
    wrap.style.cssText='display:flex;flex-direction:column;gap:8px;margin-top:4px';
    wrap.innerHTML=`<div class="form-label" style="margin-bottom:4px">Copiar de "${esc(activeSeason.name)}":</div>`;
    const items=[{key:'copyRoles',label:'Roles y Responsables',desc:'Copia todos los roles y personas definidas'},
                 {key:'copyTags',label:'Etiquetas',desc:'Copia las etiquetas con sus colores'},
                 {key:'copyBoards',label:'Tableros y áreas',desc:'Copia la estructura de tableros y columnas (sin fichas)'}];
    items.forEach(it=>{
      const div=document.createElement('label');
      div.className='copy-option';
      div.innerHTML=`<input type="checkbox" id="${it.key}" checked><div class="copy-option-text"><strong>${it.label}</strong><span>${it.desc}</span></div>`;
      wrap.appendChild(div);
    });
    opts.appendChild(wrap);
  }
  document.getElementById('seasonOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('newSeasonName').focus(),100);
};
window.closeNewSeason=()=>document.getElementById('seasonOverlay').classList.remove('open');
window.saveSeason=function(){
  const name=document.getElementById('newSeasonName').value.trim();
  if(!name){toast("Nombre obligatorio","err");return;}
  if(state.seasons.find(s=>s.name===name)){toast("Ya existe esa temporada","err");return;}
  const newId=uid();
  state.seasons.push({id:newId,name,order:state.seasons.length});
  const newData=ensureSD(newId);

  // Copy from active season if checked
  if(activeSeason){
    const src=state.data[activeSeason.id]||emptySeasonData();
    const copyRoles=document.getElementById('copyRoles')?.checked;
    const copyTags=document.getElementById('copyTags')?.checked;
    const copyBoards=document.getElementById('copyBoards')?.checked;
    if(copyRoles){
      newData.roles=src.roles.map(r=>({...r,id:uid()}));
      newData.persons=src.persons.map(p=>({...p,id:uid()}));
    }
    if(copyTags) newData.tags=src.tags.map(t=>({...t,id:uid()}));
    if(copyBoards){
      // Remap IDs
      src.boards.forEach(b=>{
        const newBId=uid();
        newData.boards.push({...b,id:newBId});
        src.columns.filter(c=>c.boardId===b.id).forEach(c=>{
          newData.columns.push({...c,id:uid(),boardId:newBId});
        });
      });
    }
  }

  activeSeason=state.seasons[state.seasons.length-1];
  closeNewSeason();
  scheduleSave();
  renderSeasonList();
  showHome();
  toast(`✅ Temporada "${name}" creada`,"ok");
};

// DELETE
// =====================================================
window.askDelete=function(type,id){
  document.getElementById('cardOverlay').classList.remove('open');
  document.getElementById('colOverlay').classList.remove('open');
  document.getElementById('boardOverlay').classList.remove('open');
  deleteTarget={type,id};
  const d=sd();
  let name='';
  if(type==='card')   name=(d.cards.find(c=>c.id===id)||{}).title;
  if(type==='col')    name=(d.columns.find(c=>c.id===id)||{}).name;
  if(type==='board')  name=(d.boards.find(b=>b.id===id)||{}).name;
  const extras=type==='col'?' Las fichas de esta área también se eliminarán.':type==='board'?' Todas sus áreas y fichas se eliminarán.':'';
  document.getElementById('delMsg').textContent=`¿Seguro que quieres eliminar "${name}"?${extras}`;
  document.getElementById('delOverlay').classList.add('open');
};
window.closeDelModal=()=>{document.getElementById('delOverlay').classList.remove('open');deleteTarget=null;};

// =====================================================
// INLINE CONFIRM — shown inside the modal itself
// =====================================================
function showInlineConfirm(overlayId, type, id, message) {
  // Remove any existing confirm banner
  document.querySelectorAll('.inline-confirm-banner').forEach(el => el.remove());

  const overlay = document.getElementById(overlayId);
  const modal = overlay?.querySelector('.modal');
  if (!modal) return;

  const banner = document.createElement('div');
  banner.className = 'inline-confirm-banner';
  banner.style.cssText = 'position:sticky;bottom:0;background:#fef2f2;border-top:2px solid var(--red);padding:14px 20px;display:flex;flex-direction:column;gap:10px;animation:modalIn .15s ease;';
  banner.innerHTML = `
    <div style="font-size:13px;font-weight:600;color:var(--red);">⚠ ${message}</div>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button class="btn" onclick="this.closest('.inline-confirm-banner').remove()" style="font-size:12px">Cancelar</button>
      <button class="btn" style="background:var(--red);color:#fff;border-color:var(--red);font-size:12px" onclick="executeDelete('${type}','${id}')">Sí, eliminar</button>
    </div>`;
  modal.appendChild(banner);
  banner.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

window.executeDelete = async function(type, id) {
  // Close any open modal
  ['cardOverlay','colOverlay','boardOverlay'].forEach(oid => {
    document.getElementById(oid)?.classList.remove('open');
  });
  document.querySelectorAll('.inline-confirm-banner').forEach(el => el.remove());
  // Reuse confirmDelete logic
  deleteTarget = { type, id };
  await window.confirmDelete();
};

// =====================================================
// DELETE HELPERS — Firebase first, then memory
// =====================================================

// Deletes all docs in a Firestore subcollection path
async function deleteCollectionDocs(path) {
  const snap = await getDocs(collection(db, path));
  await Promise.all(snap.docs.map(d => deleteDoc(doc(db, path, d.id))));
}

// Deletes a full season and ALL its subcollections from Firestore
async function deleteSeasonCompletely(seasonId) {
  const colls = ['boards','columns','cards','roles','persons','tags'];
  for (const c of colls) await deleteCollectionDocs(`seasons/${seasonId}/${c}`);
  await deleteDoc(doc(db, "seasons", seasonId));
}

window.confirmDelete = async function(){
  if (!deleteTarget) return;
  const { type, id } = deleteTarget;
  const sid = activeSeason.id;
  const d = sd();

  closeDelModal();

  try {
    if (type === 'card') {
      // 1. Delete from Firebase
      await deleteDoc(doc(db, `seasons/${sid}/cards`, id));
      // 2. Update memory
      d.cards = d.cards.filter(c => c.id !== id);
      // 3. Render
      renderKanban();
      toast("🗑 Ficha eliminada", "info");

    } else if (type === 'col') {
      // 1. Delete column + all child cards from Firebase
      const childIds = d.cards.filter(c => c.columnId === id).map(c => c.id);
      await deleteDoc(doc(db, `seasons/${sid}/columns`, id));
      await Promise.all(childIds.map(cid => deleteDoc(doc(db, `seasons/${sid}/cards`, cid))));
      // 2. Update memory
      d.columns = d.columns.filter(c => c.id !== id);
      d.cards   = d.cards.filter(c => c.columnId !== id);
      // 3. Render
      renderKanban();
      toast("🗑 Área eliminada", "info");

    } else if (type === 'board') {
      // 1. Delete board + all columns + all their cards from Firebase
      const colIds  = d.columns.filter(c => c.boardId === id).map(c => c.id);
      const cardIds = d.cards.filter(c => colIds.includes(c.columnId)).map(c => c.id);
      await deleteDoc(doc(db, `seasons/${sid}/boards`, id));
      await Promise.all(colIds.map(cid  => deleteDoc(doc(db, `seasons/${sid}/columns`, cid))));
      await Promise.all(cardIds.map(cid => deleteDoc(doc(db, `seasons/${sid}/cards`,   cid))));
      // 2. Update memory
      d.boards  = d.boards.filter(b  => b.id !== id);
      d.columns = d.columns.filter(c => c.boardId !== id);
      d.cards   = d.cards.filter(c  => !cardIds.includes(c.id));
      // 3. Render
      activeBoard = null;
      showHome();
      toast("🗑 Tablero eliminado", "info");

    } else if (type === 'season') {
      // 1. Delete entire season tree from Firebase
      await deleteSeasonCompletely(id);
      // 2. Update memory
      state.seasons = state.seasons.filter(s => s.id !== id);
      delete state.data[id];
      if (activeSeason?.id === id) activeSeason = state.seasons[0] || null;
      // 3. Render
      renderSeasonList();
      showHome();
      toast("🗑 Temporada eliminada", "info");
    }

  } catch(e) {
    console.error("Firebase delete error:", e);
    toast("❌ Error al borrar en Firebase. Recarga la página.", "err");
    // Do NOT update local state — Firebase is source of truth
  }
};

// FILTERS / VIEW

window.filterCards=q=>{searchQuery=q;renderBoard();renderList();};
window.filterByArea=v=>{filterArea=v;renderBoard();renderList();updateFilters();};
window.filterByRole=v=>{filterRole=v;renderBoard();renderList();updateFilters();};
window.filterByPerson=v=>{filterPerson=v;renderBoard();renderList();updateFilters();};

window.setView=function(v){
  currentView=v;
  document.getElementById('board').style.display=v==='board'?'flex':'none';
  document.getElementById('listView').style.display=v==='list'?'block':'none';

  document.getElementById('vList').classList.toggle('active',v==='list');

// =====================================================
// CONFIG PANEL
// =====================================================
window.openConfig=function(){
  document.getElementById('configSeasonLabel').textContent=activeSeason?.name||'';
  renderMaestroLists();
  renderSeasonList();
  document.getElementById('configOverlay').classList.add('open');
};
window.closeConfig=()=>document.getElementById('configOverlay').classList.remove('open');

function renderMaestroLists(){
  renderMaestroList('roles','roleList');
  renderMaestroList('persons','personList');
  renderMaestroList('tags','tagList');
}

function renderMaestroList(type,listId){
  const list=document.getElementById(listId); list.innerHTML='';
  const data=sd(); const items=data[type];
  if(!items||!items.length){list.innerHTML=`<div class="panel-empty">Sin ${type==='roles'?'roles':type==='persons'?'responsables':'etiquetas'} todavía</div>`;return;}
  items.forEach(item=>{
    let count=0;
    if(type==='roles')   count=data.cards.filter(c=>c.role===item.name).length;
    if(type==='persons') count=data.cards.filter(c=>c.person===item.name).length;
    if(type==='tags')    count=data.cards.filter(c=>(c.tags||[]).includes(item.name)).length;
    const div=document.createElement('div'); div.className='maestro-item';
    div.innerHTML=`
      <div class="maestro-dot" style="background:${item.color||'var(--rm-blue)'}"></div>
      <div class="maestro-name">${esc(item.name)}${type==='persons'&&item.role?`<span class="maestro-sub">${esc(item.role)}</span>`:''}</div>
      <span class="maestro-count">${count} ficha${count!==1?'s':''}</span>
      <button class="maestro-del" onclick="deleteMaestro('${type}','${item.id}')">×</button>`;
    list.appendChild(div);
  });
}

function renderSeasonList(){
  const list=document.getElementById('seasonList'); if(!list)return;
  list.innerHTML='';
  [...state.seasons].sort((a,b)=>(a.order||0)-(b.order||0)).forEach(s=>{
    const isActive=s.id===activeSeason?.id;
    const div=document.createElement('div'); div.className='maestro-item';
    div.style.cssText=isActive?'border-color:var(--rm-blue);background:var(--rm-blue-bg)':'';
    div.innerHTML=`
      <div class="maestro-dot" style="background:${isActive?'var(--rm-blue)':'var(--text-faint)'}"></div>
      <div class="maestro-name" style="color:${isActive?'var(--rm-blue)':'var(--text)'}">${esc(s.name)}${isActive?' <span style="font-size:10px;font-weight:700;color:var(--rm-blue)">(activa)</span>':''}</div>
      ${!isActive?`<button class="maestro-del" onclick="switchSeason('${s.id}')">→</button>`:''}
      ${!isActive?`<button class="maestro-del" onclick="askDeleteSeason('${s.id}')">×</button>`:''}`;
    list.appendChild(div);
  });
}

window.switchSeason=function(sid){
  activeSeason=state.seasons.find(s=>s.id===sid);
  activeBoard=null;
  document.getElementById('configSeasonLabel').textContent=activeSeason?.name||'';
  renderMaestroLists();
  renderSeasonList();
  showHome();
  toast(`📅 Temporada ${activeSeason.name} activa`,"ok");
};

window.askDeleteSeason=function(sid){
  const s=state.seasons.find(x=>x.id===sid);
  deleteTarget={type:'season',id:sid};
  document.getElementById('delMsg').textContent=`¿Eliminar la temporada "${s?.name}"? Se borrarán todos sus tableros, áreas, fichas y maestros. Esta acción no se puede deshacer.`;
  document.getElementById('delOverlay').classList.add('open');
};

window.addMaestro=function(type){
  const d=ensureSD(activeSeason.id);
  let item={id:uid()};
  if(type==='roles'){
    const name=document.getElementById('newRoleName').value.trim();
    if(!name){toast("Nombre obligatorio","err");return;}
    if(d.roles.find(x=>x.name.toLowerCase()===name.toLowerCase())){toast("Ya existe","err");return;}
    item.name=name; document.getElementById('newRoleName').value='';
  } else if(type==='persons'){
    const name=document.getElementById('newPersonName').value.trim();
    const role=document.getElementById('newPersonRole').value.trim();
    if(!name){toast("Nombre obligatorio","err");return;}
    if(d.persons.find(x=>x.name.toLowerCase()===name.toLowerCase())){toast("Ya existe","err");return;}
    item.name=name; item.role=role;
    document.getElementById('newPersonName').value=''; document.getElementById('newPersonRole').value='';
  } else if(type==='tags'){
    const name=document.getElementById('newTagName').value.trim();
    if(!name){toast("Nombre obligatorio","err");return;}
    if(d.tags.find(x=>x.name.toLowerCase()===name.toLowerCase())){toast("Ya existe","err");return;}
    item.name=name; item.color=selectedTagColor;
    document.getElementById('newTagName').value='';
  }
  d[type].push(item);
  scheduleSave(); renderMaestroLists();
  if(activeBoard) updateFilters();
  toast("✅ Añadido","ok");
};

window.deleteMaestro=async function(type,id){
  const d=sd(); const item=d[type].find(x=>x.id===id); if(!item)return;
  let inUse=0;
  if(type==='roles')   inUse=d.cards.filter(c=>c.role===item.name).length;
  if(type==='persons') inUse=d.cards.filter(c=>c.person===item.name).length;
  if(type==='tags')    inUse=d.cards.filter(c=>(c.tags||[]).includes(item.name)).length;
  if(inUse>0){toast(`En uso en ${inUse} ficha${inUse!==1?'s':''}. Edítalas primero.`,"err");return;}
  try {
    // 1. Delete from Firebase first
    await deleteDoc(doc(db, `seasons/${activeSeason.id}/${type}`, id));
    // 2. Update memory only after Firebase confirms
    d[type]=d[type].filter(x=>x.id!==id);
    renderMaestroLists();
    if(activeBoard) updateFilters();
    toast("🗑 Eliminado","info");
  } catch(e) {
    console.error("Firebase delete error:", e);
    toast("❌ Error al borrar en Firebase","err");
  }
};

// =====================================================
// COLOR GRID
// =====================================================
function renderColorGrid(gridId,type){
  const grid=document.getElementById(gridId); grid.innerHTML='';
  const sel=type==='card'?selectedColor:type==='col'?selectedColColor:selectedBoardColor;
  COLORS.forEach(c=>{
    const sw=document.createElement('div');
    sw.className='color-swatch'+(c===sel?' selected':'');
    sw.style.background=c;
    sw.onclick=()=>{if(type==='card')selectedColor=c;else if(type==='col')selectedColColor=c;else selectedBoardColor=c;renderColorGrid(gridId,type);};
    grid.appendChild(sw);
  });
}

function initTagColorMini(){
  const wrap=document.getElementById('tagColorMini'); if(!wrap)return;
  wrap.innerHTML='';
  COLORS.forEach(c=>{
    const sw=document.createElement('div');
    sw.className='mini-sw'+(c===selectedTagColor?' sel':'');
    sw.style.background=c;
    sw.onclick=()=>{selectedTagColor=c;initTagColorMini();};
    wrap.appendChild(sw);
  });
}

// =====================================================
// HELPERS
// =====================================================
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg,type='info'){
  const wrap=document.getElementById('toastWrap');
  const t=document.createElement('div');
  t.className=`toast ${type}`;t.textContent=msg;
  wrap.appendChild(t);setTimeout(()=>t.remove(),3000);
}
function setSaveDot(st,label){
  document.getElementById('saveDot').className='save-dot'+(st!=='ok'?' '+st:'');
  document.getElementById('saveLabel').textContent=label;
}
function setFooterStatus(msg){const el=document.getElementById('footerStatus');if(el)el.textContent='· '+msg;}
