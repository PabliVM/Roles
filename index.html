<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Departamento de Formación — Roles y Tareas</title>
<style>
/* === VARIABLES CORPORATIVAS === */
:root{
  --bg:#f0f2f5; --surface:#ffffff; --surface-alt:#fafbfc;
  --border:#dfe1e6; --border-light:#eaecf0;
  --text:#1a1d23; --text-sec:#5a6170; --text-mut:#8b919e; --text-faint:#b4b9c4;
  --rm-blue:#2563eb; --rm-blue-lt:#3b7cf5; --rm-blue-bg:#edf1fc;
  --green:#16a34a; --orange:#ea580c; --red:#dc2626;
  --sh-sm:0 1px 3px rgba(0,0,0,.06); --sh-md:0 2px 8px rgba(0,0,0,.08); --sh-lg:0 4px 16px rgba(0,0,0,.12);
  --r:8px; --rs:5px; --rl:12px;
  --font:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif; --tr:.2s ease;
}
body.dark{
  --bg:#1a1d23; --surface:#23272f; --surface-alt:#2a2e36;
  --border:#3a3f4a; --border-light:#32363e;
  --text:#e4e6ea; --text-sec:#a0a5b0; --text-mut:#707580; --text-faint:#505560;
  --rm-blue-bg:#1e2a4a;
  --sh-sm:0 1px 3px rgba(0,0,0,.2); --sh-md:0 2px 8px rgba(0,0,0,.3); --sh-lg:0 4px 16px rgba(0,0,0,.4);
}
*{ margin:0; padding:0; box-sizing:border-box; }
body{ font-family:var(--font); background:var(--bg); color:var(--text); line-height:1.45; font-size:13px; -webkit-font-smoothing:antialiased; padding-bottom:54px; }

/* === HEADER === */
.header{ background:var(--rm-blue); padding:12px 24px; display:flex; align-items:center; gap:14px; position:sticky; top:0; z-index:200; box-shadow:0 2px 8px rgba(0,0,0,.15); }
.header-logo{ width:38px; height:38px; border-radius:50%; background:#fff; display:flex; align-items:center; justify-content:center; flex-shrink:0; overflow:hidden; padding:3px; }
.header-logo img{ width:100%; height:100%; object-fit:contain; }
.header-title-wrap{ display:flex; align-items:baseline; gap:10px; min-width:0; flex:1; }
.doc-title{ font-size:17px; font-weight:700; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; letter-spacing:-.3px; }
.doc-season{ font-size:13px; font-weight:500; color:rgba(255,255,255,.72); white-space:nowrap; }
.header-actions{ display:flex; align-items:center; gap:8px; flex-shrink:0; }
.btn-dark{ width:28px; height:28px; border-radius:50%; border:1px solid rgba(255,255,255,.2); background:rgba(255,255,255,.12); color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:14px; transition:all var(--tr); }
.btn-dark:hover{ background:rgba(255,255,255,.25); }
.btn-save{ padding:5px 14px; border-radius:20px; border:1px solid rgba(255,255,255,.3); background:rgba(255,255,255,.15); color:#fff; font-size:12px; font-weight:600; cursor:pointer; transition:all var(--tr); display:flex; align-items:center; gap:6px; }
.btn-save:hover{ background:rgba(255,255,255,.28); }
.save-dot{ width:7px; height:7px; border-radius:50%; background:#4ade80; flex-shrink:0; }
.save-dot.saving{ background:#fbbf24; animation:pulse .8s infinite; }
.save-dot.error{ background:#f87171; }
@keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:.4} }

/* === TOOLBAR === */
.toolbar{ background:var(--surface); border-bottom:1px solid var(--border); padding:8px 24px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.btn{ padding:5px 14px; border-radius:6px; border:1px solid var(--border); background:var(--surface); color:var(--text); font-size:12px; font-weight:500; cursor:pointer; transition:all var(--tr); display:flex; align-items:center; gap:5px; }
.btn:hover{ background:var(--surface-alt); border-color:var(--rm-blue); color:var(--rm-blue); }
.btn-primary{ background:var(--rm-blue); color:#fff; border-color:var(--rm-blue); }
.btn-primary:hover{ background:var(--rm-blue-lt); color:#fff; border-color:var(--rm-blue-lt); }
.btn-maestro{ border-color:var(--orange); color:var(--orange); }
.btn-maestro:hover{ background:#fff7ed; border-color:var(--orange); color:var(--orange); }
body.dark .btn-maestro:hover{ background:#2a1f10; }
.toolbar-sep{ width:1px; height:20px; background:var(--border); }
.view-toggle{ display:flex; border:1px solid var(--border); border-radius:6px; overflow:hidden; }
.view-toggle button{ padding:4px 12px; font-size:12px; border:none; background:var(--surface); color:var(--text-sec); cursor:pointer; transition:all var(--tr); }
.view-toggle button.active{ background:var(--rm-blue); color:#fff; }
.search-box{ flex:1; min-width:160px; max-width:260px; padding:5px 10px; border-radius:6px; border:1px solid var(--border); background:var(--surface-alt); color:var(--text); font-size:12px; }
.search-box:focus{ outline:none; border-color:var(--rm-blue); }
.filter-sel{ padding:5px 10px; border-radius:6px; border:1px solid var(--border); background:var(--surface-alt); color:var(--text); font-size:12px; cursor:pointer; max-width:160px; }
.filter-active{ border-color:var(--rm-blue); color:var(--rm-blue); font-weight:600; }

/* === BOARD === */
.main{ max-width:1700px; margin:0 auto; padding:16px 24px; }
.board{ display:flex; gap:16px; align-items:flex-start; overflow-x:auto; padding-bottom:16px; }
.column{ min-width:260px; width:260px; flex-shrink:0; }
.col-header{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; padding:0 2px; }
.col-title{ font-size:13px; font-weight:700; color:var(--text); display:flex; align-items:center; gap:7px; }
.col-dot{ width:10px; height:10px; border-radius:50%; }
.col-count{ font-size:11px; font-weight:600; background:var(--surface-alt); border:1px solid var(--border); color:var(--text-sec); border-radius:20px; padding:1px 7px; }
.col-add{ width:24px; height:24px; border-radius:50%; border:1px solid var(--border); background:transparent; color:var(--text-sec); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; transition:all var(--tr); }
.col-add:hover{ background:var(--rm-blue); color:#fff; border-color:var(--rm-blue); }
.drop-zone{ min-height:80px; display:flex; flex-direction:column; gap:8px; border-radius:var(--rl); padding:4px; transition:background .15s; }
.drop-zone.drag-over{ background:var(--rm-blue-bg); outline:2px dashed var(--rm-blue); }

/* === CARDS === */
.card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:12px; box-shadow:var(--sh-sm); cursor:grab; transition:box-shadow var(--tr), transform var(--tr); position:relative; overflow:hidden; }
.card:hover{ box-shadow:var(--sh-md); }
.card.dragging{ opacity:.5; transform:rotate(2deg); }
.card-stripe{ position:absolute; top:0; left:0; width:4px; height:100%; }
.card-top{ display:flex; align-items:flex-start; gap:8px; margin-bottom:6px; }
.card-title{ font-size:13px; font-weight:600; color:var(--text); flex:1; line-height:1.3; }
.card-role-badge{ font-size:10px; font-weight:700; padding:2px 7px; border-radius:20px; background:var(--rm-blue-bg); color:var(--rm-blue); white-space:nowrap; flex-shrink:0; }
.card-desc{ font-size:11.5px; color:var(--text-sec); line-height:1.4; margin-bottom:8px; }
.card-tags{ display:flex; gap:4px; flex-wrap:wrap; margin-bottom:8px; }
.tag{ font-size:10px; font-weight:600; padding:2px 7px; border-radius:20px; background:var(--surface-alt); color:var(--text-sec); border:1px solid var(--border-light); }
.card-footer{ display:flex; align-items:center; justify-content:space-between; border-top:1px solid var(--border-light); padding-top:7px; margin-top:4px; }
.card-person{ font-size:11px; color:var(--text-mut); display:flex; align-items:center; gap:4px; }
.avatar{ width:18px; height:18px; border-radius:50%; background:var(--rm-blue); color:#fff; font-size:9px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.card-actions{ display:flex; gap:4px; }
.card-btn{ width:22px; height:22px; border-radius:4px; border:1px solid var(--border); background:transparent; color:var(--text-sec); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:11px; transition:all var(--tr); }
.card-btn:hover{ background:var(--surface-alt); color:var(--text); }
.card-btn.del:hover{ background:#fef2f2; color:var(--red); border-color:var(--red); }
.col-new{ min-width:220px; width:220px; border:2px dashed var(--border); border-radius:var(--rl); display:flex; align-items:center; justify-content:center; padding:40px 20px; cursor:pointer; transition:all var(--tr); color:var(--text-mut); font-size:13px; flex-shrink:0; flex-direction:column; gap:8px; }
.col-new:hover{ border-color:var(--rm-blue); color:var(--rm-blue); background:var(--rm-blue-bg); }
.col-new-icon{ font-size:22px; }

/* === LIST VIEW === */
.list-view{ display:none; }
.list-table{ width:100%; border-collapse:collapse; background:var(--surface); border-radius:var(--rl); overflow:hidden; box-shadow:var(--sh-sm); }
.list-table th{ padding:10px 14px; text-align:left; font-size:11px; font-weight:700; color:var(--text-sec); text-transform:uppercase; letter-spacing:.5px; background:var(--surface-alt); border-bottom:1px solid var(--border); }
.list-table td{ padding:10px 14px; border-bottom:1px solid var(--border-light); font-size:12.5px; vertical-align:middle; }
.list-table tr:last-child td{ border-bottom:none; }
.list-table tr:hover td{ background:var(--surface-alt); }
.list-stripe{ display:inline-block; width:12px; height:12px; border-radius:3px; margin-right:6px; vertical-align:middle; }

/* === MODAL BASE === */
.overlay{ display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:500; align-items:center; justify-content:center; }
.overlay.open{ display:flex; }
.modal{ background:var(--surface); border-radius:var(--rl); width:96%; max-width:520px; max-height:90vh; overflow-y:auto; box-shadow:var(--sh-lg); animation:modalIn .18s ease; }
@keyframes modalIn{ from{transform:scale(.95);opacity:0} to{transform:scale(1);opacity:1} }
.modal-header{ padding:18px 20px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.modal-title{ font-size:15px; font-weight:700; color:var(--text); }
.modal-close{ width:28px; height:28px; border-radius:50%; border:1px solid var(--border); background:transparent; cursor:pointer; font-size:16px; color:var(--text-sec); display:flex; align-items:center; justify-content:center; transition:all var(--tr); }
.modal-close:hover{ background:var(--surface-alt); }
.modal-body{ padding:20px; display:flex; flex-direction:column; gap:14px; }
.form-group{ display:flex; flex-direction:column; gap:5px; }
.form-label{ font-size:11.5px; font-weight:600; color:var(--text-sec); text-transform:uppercase; letter-spacing:.4px; }
.form-input,.form-select,.form-textarea{ padding:8px 12px; border-radius:6px; border:1px solid var(--border); background:var(--surface-alt); color:var(--text); font-size:13px; font-family:var(--font); transition:border-color var(--tr); }
.form-input:focus,.form-select:focus,.form-textarea:focus{ outline:none; border-color:var(--rm-blue); }
.form-textarea{ resize:vertical; min-height:80px; }
.form-row{ display:flex; gap:10px; }
.form-row .form-group{ flex:1; }
.color-grid{ display:flex; gap:7px; flex-wrap:wrap; }
.color-swatch{ width:28px; height:28px; border-radius:6px; cursor:pointer; border:2px solid transparent; transition:all var(--tr); }
.color-swatch.selected{ border-color:#1a1d23; transform:scale(1.15); }
body.dark .color-swatch.selected{ border-color:#fff; }
.tags-input-wrap{ display:flex; flex-wrap:wrap; gap:4px; padding:6px 8px; border-radius:6px; border:1px solid var(--border); background:var(--surface-alt); cursor:text; min-height:38px; align-items:center; }
.tags-input-wrap input{ border:none; background:transparent; outline:none; font-size:13px; color:var(--text); flex:1; min-width:80px; padding:2px 4px; }
.tag-remove{ display:flex; align-items:center; gap:3px; padding:2px 7px; border-radius:20px; background:var(--rm-blue-bg); color:var(--rm-blue); font-size:11px; font-weight:600; cursor:pointer; }
.tag-remove span{ font-size:13px; line-height:1; }
.modal-footer{ padding:14px 20px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:8px; }
.col-modal{ max-width:380px; }

/* === PANEL MAESTROS === */
.maestro-overlay{ display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:500; align-items:flex-start; justify-content:flex-end; }
.maestro-overlay.open{ display:flex; }
.maestro-panel{
  background:var(--surface); width:100%; max-width:480px; height:100vh;
  overflow-y:auto; box-shadow:var(--sh-lg);
  animation:slideIn .22s ease;
  display:flex; flex-direction:column;
}
@keyframes slideIn{ from{transform:translateX(100%)} to{transform:translateX(0)} }
.maestro-header{ padding:18px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; position:sticky; top:0; background:var(--surface); z-index:10; }
.maestro-header-icon{ font-size:20px; }
.maestro-header h2{ font-size:15px; font-weight:700; color:var(--text); flex:1; }
.maestro-body{ padding:20px; flex:1; display:flex; flex-direction:column; gap:24px; }
.maestro-section{ display:flex; flex-direction:column; gap:10px; }
.maestro-section-title{
  font-size:11px; font-weight:700; color:var(--text-sec);
  text-transform:uppercase; letter-spacing:.6px;
  display:flex; align-items:center; gap:6px;
}
.maestro-section-title span{ font-size:14px; }
.maestro-list{ display:flex; flex-direction:column; gap:6px; }
.maestro-item{
  display:flex; align-items:center; gap:10px;
  padding:8px 12px; border-radius:8px;
  background:var(--surface-alt); border:1px solid var(--border);
  transition:all var(--tr);
}
.maestro-item:hover{ border-color:var(--rm-blue); }
.maestro-item-color{ width:12px; height:12px; border-radius:50%; flex-shrink:0; }
.maestro-item-name{ flex:1; font-size:13px; font-weight:500; color:var(--text); }
.maestro-item-count{ font-size:11px; color:var(--text-mut); background:var(--bg); padding:2px 7px; border-radius:20px; }
.maestro-item-del{ width:20px; height:20px; border-radius:4px; border:none; background:transparent; color:var(--text-mut); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:13px; transition:all var(--tr); }
.maestro-item-del:hover{ color:var(--red); background:#fef2f2; }
.maestro-add-row{ display:flex; gap:8px; align-items:center; }
.maestro-add-row .form-input{ flex:1; padding:7px 10px; font-size:12.5px; }
.maestro-add-btn{ padding:7px 14px; border-radius:6px; border:1px solid var(--rm-blue); background:var(--rm-blue); color:#fff; font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap; transition:all var(--tr); }
.maestro-add-btn:hover{ background:var(--rm-blue-lt); }
.maestro-color-mini{ display:flex; gap:5px; flex-wrap:wrap; }
.mini-swatch{ width:20px; height:20px; border-radius:4px; cursor:pointer; border:2px solid transparent; transition:all var(--tr); }
.mini-swatch.selected{ border-color:var(--text); transform:scale(1.2); }
.maestro-empty{ text-align:center; padding:20px; color:var(--text-mut); font-size:12px; }
.tag-pill{ display:inline-flex; align-items:center; gap:4px; padding:4px 10px; border-radius:20px; font-size:11px; font-weight:600; border:1px solid var(--border); background:var(--surface-alt); color:var(--text-sec); }

/* === TOAST === */
.toast-wrap{ position:fixed; bottom:64px; right:20px; display:flex; flex-direction:column; gap:8px; z-index:1000; }
.toast{ padding:10px 16px; border-radius:8px; font-size:12.5px; font-weight:500; color:#fff; box-shadow:var(--sh-md); animation:toastIn .2s ease; max-width:280px; }
.toast.ok{ background:#16a34a; }
.toast.err{ background:#dc2626; }
.toast.info{ background:var(--rm-blue); }
@keyframes toastIn{ from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }

/* === FOOTER === */
.app-footer{ background:var(--rm-blue); color:rgba(255,255,255,.5); font-size:10px; letter-spacing:.3px; text-align:center; padding:12px 24px; position:fixed; left:0; right:0; bottom:0; z-index:50; display:flex; align-items:center; justify-content:center; gap:10px; }
.footer-status{ font-size:10px; color:rgba(255,255,255,.6); }

/* === RESPONSIVE === */
@media(max-width:640px){
  .header{ padding:8px 12px; gap:10px; }
  .header-logo{ width:34px; height:34px; }
  .doc-title{ font-size:14px; }
  .doc-season{ display:none; }
  .main{ padding:10px 12px; }
  .toolbar{ padding:6px 12px; gap:6px; }
  .column{ min-width:230px; width:230px; }
  .maestro-panel{ max-width:100%; }
}
.empty-state{ text-align:center; padding:40px 20px; color:var(--text-mut); }
.empty-state-icon{ font-size:36px; margin-bottom:10px; }
.empty-state-text{ font-size:13px; }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-logo">
    <img src="https://raw.githubusercontent.com/PabliVM/PLANNING/main/assets/rm.png" alt="RM">
  </div>
  <div class="header-title-wrap">
    <h1 class="doc-title">Departamento de Formación — Roles y Tareas</h1>
    <span class="doc-season" id="seasonDisplay" onclick="openSeasonPicker()" title="Cambiar temporada" style="cursor:pointer;border-bottom:1px dashed rgba(255,255,255,.4);padding-bottom:1px">Formación · 2025/2026</span>
  </div>
  <div class="header-actions">
    <button class="btn-save" id="saveBtn" onclick="manualSave()">
      <span class="save-dot" id="saveDot"></span>
      <span id="saveLabel">Guardado</span>
    </button>
    <button class="btn-dark" onclick="toggleDark()" id="darkBtn">☾</button>
  </div>
</header>

<!-- TOOLBAR -->
<div class="toolbar">
  <button class="btn btn-primary" onclick="openCardModal()">＋ Nueva ficha</button>
  <button class="btn" onclick="openColModal()">＋ Área</button>
  <button class="btn btn-maestro" onclick="openMaestro()">⚙ Maestros</button>
  <div class="toolbar-sep"></div>
  <div class="view-toggle">
    <button id="vBoard" class="active" onclick="setView('board')">⊞ Tablero</button>
    <button id="vList" onclick="setView('list')">☰ Lista</button>
  </div>
  <div class="toolbar-sep"></div>
  <input class="search-box" type="text" placeholder="🔍 Buscar fichas…" oninput="filterCards(this.value)">
  <select class="filter-sel" onchange="filterByArea(this.value)" id="areaFilter">
    <option value="">Todas las áreas</option>
  </select>
  <select class="filter-sel" onchange="filterByRole(this.value)" id="roleFilter">
    <option value="">Todos los roles</option>
  </select>
  <select class="filter-sel" onchange="filterByPerson(this.value)" id="personFilter">
    <option value="">Todos los responsables</option>
  </select>
  <select class="filter-sel" onchange="filterByTag(this.value)" id="tagFilter">
    <option value="">Todas las etiquetas</option>
  </select>
</div>

<!-- MAIN -->
<main class="main">
  <div class="board" id="board"></div>
  <div class="list-view" id="listView">
    <table class="list-table">
      <thead>
        <tr>
          <th>Título</th><th>Área</th><th>Rol</th>
          <th>Responsable</th><th>Etiquetas</th><th></th>
        </tr>
      </thead>
      <tbody id="listBody"></tbody>
    </table>
  </div>
</main>

<!-- FOOTER -->
<footer class="app-footer">
  <span>Cantera del Real Madrid CF — Departamento de Formación · Roles y Tareas</span>
  <span class="footer-status" id="footerStatus"></span>
</footer>

<!-- TOAST -->
<div class="toast-wrap" id="toastWrap"></div>

<!-- ====== CARD MODAL ====== -->
<div class="overlay" id="cardOverlay" onclick="if(event.target===this)closeCardModal()">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="cardModalTitle">Nueva ficha</span>
      <button class="modal-close" onclick="closeCardModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Título *</label>
        <input class="form-input" id="fTitle" placeholder="Nombre de la tarea o responsabilidad">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Área</label>
          <select class="form-select" id="fArea"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Rol</label>
          <select class="form-select" id="fRole">
            <option value="">Sin rol</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Responsable</label>
        <select class="form-select" id="fPerson">
          <option value="">Sin asignar</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Descripción</label>
        <textarea class="form-textarea" id="fDesc" placeholder="Detalla la tarea, objetivo o responsabilidad…"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Etiquetas</label>
        <div id="tagCheckboxes" style="display:flex;flex-wrap:wrap;gap:6px;padding:4px 0;"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Color de la ficha</label>
        <div class="color-grid" id="colorGrid"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" id="cardDelBtn" style="display:none;background:var(--red);color:#fff;border-color:var(--red);margin-right:auto" onclick="deleteCurrentCard()">🗑 Eliminar</button>
      <button class="btn" onclick="closeCardModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveCard()">Guardar ficha</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

  getFirestore, collection, getDocs, deleteDoc, doc, setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCkc2CT8lBWFqo94nlC4J3WIQb2Q3gVSfE",

  storageBucket: "roles-3f4a0.firebasestorage.app",
  messagingSenderId: "224811008593",
  appId: "1:224811008593:web:3fbd10854547905013ae70"
};

let db = null, useFirebase = false;
try {
  const app = initializeApp(firebaseConfig);
  db = getFirestore(app);
  useFirebase = true;
  setFooterStatus("🔥 Firebase conectado");
} catch(e) { setFooterStatus("💾 localStorage"); }

// =====================================================
// STATE
// =====================================================
const COLORS = [
  "#2563eb","#7c3aed","#db2777","#dc2626",
  "#ea580c","#d97706","#16a34a","#0891b2","#475569","#64748b"
];

let state = {
  columns: [], cards: [],
  roles: [], persons: [], tags: []  // maestros
};

let editingCardId = null, editingColId = null;
let selectedColor = COLORS[0], selectedColColor = COLORS[6];
let selectedTagColor = COLORS[8];
let selectedCardTags = [];
let deleteTarget = null;
let currentView = 'board';
let searchQuery = '', filterArea = '', filterRole = '', filterPerson = '', filterTag = '';
let dragCardId = null, saveTimeout = null;

// =====================================================
// INIT
// =====================================================
window.addEventListener('DOMContentLoaded', async () => {
  initDarkMode();
  initSeason();
  renderMiniTagColors();
  await loadData();
  render();
});

function initSeason() {
  const s = getActiveSeason();
  document.getElementById('seasonDisplay').textContent = 'Formación · ' + s;
}

// =====================================================
// PERSISTENCE
// =====================================================
async function loadData() {
  if (useFirebase) {
    try {
      const [colSnap, cardSnap, roleSnap, personSnap, tagSnap] = await Promise.all([
        getDocs(collection(db, "columns")),
        getDocs(collection(db, "cards")),
        getDocs(collection(db, "roles")),
        getDocs(collection(db, "persons")),
        getDocs(collection(db, "tags"))
      ]);
      state.columns = colSnap.docs.map(d=>({id:d.id,...d.data()}));
      state.cards   = cardSnap.docs.map(d=>({id:d.id,...d.data()}));
      state.roles   = roleSnap.docs.map(d=>({id:d.id,...d.data()}));
      state.persons = personSnap.docs.map(d=>({id:d.id,...d.data()}));
      state.tags    = tagSnap.docs.map(d=>({id:d.id,...d.data()}));
      if (!state.columns.length) seedDefault();
      return;
    } catch(e) { console.warn("Firebase load failed", e); }
  }
  const saved = localStorage.getItem("rm_roles_state");
  if (saved) { state = {...state, ...JSON.parse(saved)}; }
  else { seedDefault(); }
}

function seedDefault() {
  state.columns = [
    { id: uid(), name: "Planificación", color: "#2563eb", order: 0 },

    { id: uid(), name: "Competición",   color: "#db2777", order: 4 },
  ];
  state.roles   = [
    { id: uid(), name: "Coordinador" },
    { id: uid(), name: "Técnico" },
    { id: uid(), name: "Ojeador" },
    { id: uid(), name: "Jefe de Área" },
  ];
  state.persons = [
    { id: uid(), name: "Javier M.", role: "Coordinador" },
    { id: uid(), name: "Lucía P.",  role: "Jefe de Área" },
    { id: uid(), name: "Carlos D.", role: "Ojeador" },
    { id: uid(), name: "Ana R.",    role: "Técnico" },
    { id: uid(), name: "Miguel S.", role: "Coordinador" },
  ];
  state.tags = [
    { id: uid(), name: "Cantera",      color: "#2563eb" },

  state.cards = [

      tags: ["Filial"], color: "#7c3aed" },

      tags: ["Captación"], color: "#16a34a" },
    { id: uid(), title: "Evaluación técnico-táctica mensual", columnId: state.columns[3].id,

}

function scheduleSave() {
  setSaveDot('saving','Guardando…');
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(persistAll, 1200);
}

async function persistAll() {
  if (useFirebase) {
    try {
      const colls = ['columns','cards','roles','persons','tags'];
      for (const coll of colls) {
        for (const item of state[coll] || []) {
          const { id, ...data } = item;
          await setDoc(doc(db, coll, id), data);
        }
      }
      setSaveDot('ok','Guardado'); return;
    } catch(e) { console.warn("Firebase save failed", e); }
  }
  localStorage.setItem("rm_roles_state", JSON.stringify(state));
  setSaveDot('ok','Guardado');
}

window.manualSave = async function() {
  setSaveDot('saving','Guardando…');
  await persistAll();
  toast("✅ Guardado correctamente","ok");
};

// =====================================================
// RENDER
// =====================================================
function render() {
  renderBoard();
  renderList();
  updateAllFilters();
}

function getFilteredCards() {
  return state.cards.filter(c => {
    const q = searchQuery.toLowerCase();
    if (q && ![c.title,c.desc,c.person,c.role,...(c.tags||[])].some(x=>(x||'').toLowerCase().includes(q))) return false;
    if (filterArea   && c.columnId !== filterArea) return false;
    if (filterRole   && (c.role||'').toLowerCase() !== filterRole.toLowerCase()) return false;
    if (filterPerson && (c.person||'').toLowerCase() !== filterPerson.toLowerCase()) return false;
    if (filterTag    && !(c.tags||[]).includes(filterTag)) return false;
    return true;
  });
}

function renderBoard() {
  const board = document.getElementById('board');
  const filtered = getFilteredCards();
  const cols = [...state.columns].sort((a,b)=>(a.order||0)-(b.order||0));
  board.innerHTML = '';
  cols.forEach(col => {
    const colCards = filtered.filter(c=>c.columnId===col.id);
    const colEl = document.createElement('div');
    colEl.className = 'column';
    colEl.innerHTML = `
      <div class="col-header">
        <div class="col-title">
          <span class="col-dot" style="background:${col.color}"></span>${esc(col.name)}
        </div>
        <div style="display:flex;gap:5px;align-items:center">
          <span class="col-count">${colCards.length}</span>
          <button class="col-add" title="Añadir ficha" onclick="openCardModal('${col.id}')">＋</button>
          <button class="card-btn" onclick="openColModal('${col.id}')">✏️</button>
          <button class="card-btn del" onclick="askDelete('col','${col.id}')">🗑</button>
        </div>
      </div>
      <div class="drop-zone" id="zone-${col.id}"
           ondragover="onDragOver(event,'${col.id}')"
           ondragleave="onDragLeave(event)"
           ondrop="onDrop(event,'${col.id}')">
        ${colCards.length?'':'<div class="empty-state"><div class="empty-state-icon">📋</div><div class="empty-state-text">Sin fichas aún</div></div>'}
      </div>`;
    const zone = colEl.querySelector('.drop-zone');
    colCards.forEach(card => zone.appendChild(buildCard(card, col.color)));
    board.appendChild(colEl);
  });
  const addCol = document.createElement('div');
  addCol.className = 'col-new';
  addCol.onclick = () => openColModal();
  addCol.innerHTML = `<span class="col-new-icon">＋</span><span>Nueva área</span>`;
  board.appendChild(addCol);
}

function buildCard(card, colColor) {
  const el = document.createElement('div');
  el.className = 'card';
  el.draggable = true;
  el.dataset.id = card.id;
  el.ondragstart = e => onDragStart(e, card.id);
  el.ondragend = onDragEnd;
  const color = card.color || colColor || COLORS[0];
  const initials = (card.person||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
  const tags = (card.tags||[]).map(t => {
    const tagDef = state.tags.find(td=>td.name===t);
    const tc = tagDef?.color || '#64748b';
    return `<span class="tag" style="background:${tc}18;color:${tc};border-color:${tc}40">${esc(t)}</span>`;
  }).join('');
  el.innerHTML = `
    <div class="card-stripe" style="background:${color}"></div>
    <div class="card-top">
      <div class="card-title">${esc(card.title)}</div>
      ${card.role?`<span class="card-role-badge">${esc(card.role)}</span>`:''}
    </div>
    ${card.desc?`<div class="card-desc">${esc(card.desc)}</div>`:''}
    ${tags?`<div class="card-tags">${tags}</div>`:''}
    <div class="card-footer">
      <div class="card-person">
        <div class="avatar" style="background:${color}">${initials}</div>
        ${esc(card.person||'Sin asignar')}
      </div>
      <div class="card-actions">
        <button class="card-btn" onclick="openCardModal(null,'${card.id}')">✏️</button>
        <button class="card-btn del" onclick="askDelete('card','${card.id}')">🗑</button>
      </div>
    </div>`;
  return el;
}

function renderList() {
  const tbody = document.getElementById('listBody');
  const filtered = getFilteredCards();
  const cols = Object.fromEntries(state.columns.map(c=>[c.id,c]));
  tbody.innerHTML = '';
  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:30px;color:var(--text-mut)">Sin resultados</td></tr>`;
    return;
  }
  filtered.forEach(card => {
    const col = cols[card.columnId]||{};
    const color = card.color||col.color||'#888';
    const tags = (card.tags||[]).map(t=>{
      const td=state.tags.find(x=>x.name===t);
      const tc=td?.color||'#64748b';
      return `<span class="tag" style="background:${tc}18;color:${tc};border-color:${tc}40">${esc(t)}</span>`;
    }).join(' ');
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><span class="list-stripe" style="background:${color}"></span><strong>${esc(card.title)}</strong></td>
      <td>${esc(col.name||'—')}</td>
      <td>${esc(card.role||'—')}</td>
      <td>${esc(card.person||'—')}</td>
      <td>${tags||'<span style="color:var(--text-mut)">—</span>'}</td>
      <td>
        <button class="card-btn" onclick="openCardModal(null,'${card.id}')">✏️</button>
        <button class="card-btn del" onclick="askDelete('card','${card.id}')">🗑</button>
      </td>`;
    tbody.appendChild(tr);
  });
}

function updateAllFilters() {
  // Area filter
  const asel = document.getElementById('areaFilter');
  const av = asel.value;
  asel.innerHTML = '<option value="">Todas las áreas</option>';
  state.columns.forEach(col => asel.innerHTML += `<option value="${col.id}" ${av===col.id?'selected':''}>${esc(col.name)}</option>`);
  asel.className = 'filter-sel' + (filterArea?' filter-active':'');

  // Role filter — from maestros
  const rsel = document.getElementById('roleFilter');
  const rv = rsel.value;
  rsel.innerHTML = '<option value="">Todos los roles</option>';
  state.roles.forEach(r => rsel.innerHTML += `<option value="${r.name}" ${rv===r.name?'selected':''}>${esc(r.name)}</option>`);
  rsel.className = 'filter-sel' + (filterRole?' filter-active':'');

  // Person filter — from maestros
  const psel = document.getElementById('personFilter');
  const pv = psel.value;
  psel.innerHTML = '<option value="">Todos los responsables</option>';
  state.persons.forEach(p => psel.innerHTML += `<option value="${p.name}" ${pv===p.name?'selected':''}>${esc(p.name)}</option>`);
  psel.className = 'filter-sel' + (filterPerson?' filter-active':'');

  // Tag filter — from maestros
  const tsel = document.getElementById('tagFilter');
  const tv = tsel.value;
  tsel.innerHTML = '<option value="">Todas las etiquetas</option>';
  state.tags.forEach(t => tsel.innerHTML += `<option value="${t.name}" ${tv===t.name?'selected':''}>${esc(t.name)}</option>`);
  tsel.className = 'filter-sel' + (filterTag?' filter-active':'');

  // Card modal selects
  const fArea = document.getElementById('fArea');
  if (fArea) {
    const faV = fArea.value;
    fArea.innerHTML = '';
    state.columns.forEach(col => fArea.innerHTML += `<option value="${col.id}">${esc(col.name)}</option>`);
    if (faV) fArea.value = faV;
  }
  const fRole = document.getElementById('fRole');
  if (fRole) {
    const frV = fRole.value;
    fRole.innerHTML = '<option value="">Sin rol</option>';
    state.roles.forEach(r => fRole.innerHTML += `<option value="${r.name}">${esc(r.name)}</option>`);
    if (frV) fRole.value = frV;
  }
  const fPerson = document.getElementById('fPerson');
  if (fPerson) {
    const fpV = fPerson.value;
    fPerson.innerHTML = '<option value="">Sin asignar</option>';
    state.persons.forEach(p => fPerson.innerHTML += `<option value="${p.name}">${esc(p.name)}</option>`);
    if (fpV) fPerson.value = fpV;
  }
}

// =====================================================
// DRAG & DROP
// =====================================================
function onDragStart(e, cardId) { dragCardId=cardId; e.currentTarget.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; }
function onDragEnd(e) { e.currentTarget.classList.remove('dragging'); document.querySelectorAll('.drop-zone').forEach(z=>z.classList.remove('drag-over')); }
function onDragOver(e, colId) { e.preventDefault(); e.dataTransfer.dropEffect='move'; document.querySelectorAll('.drop-zone').forEach(z=>z.classList.remove('drag-over')); document.getElementById('zone-'+colId).classList.add('drag-over'); }
function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function onDrop(e, colId) {
  e.preventDefault();
  document.querySelectorAll('.drop-zone').forEach(z=>z.classList.remove('drag-over'));
  if (!dragCardId) return;
  const card = state.cards.find(c=>c.id===dragCardId);
  if (card && card.columnId!==colId) { card.columnId=colId; scheduleSave(); render(); toast("📌 Ficha movida","info"); }
  dragCardId=null;
}

// =====================================================
// CARD MODAL
// =====================================================
window.openCardModal = function(colId=null, cardId=null) {
  editingCardId = cardId;
  selectedColor = COLORS[0];
  selectedCardTags = [];

  document.getElementById('cardModalTitle').textContent = cardId ? 'Editar ficha' : 'Nueva ficha';
  document.getElementById('cardDelBtn').style.display = cardId ? 'flex' : 'none';
  updateAllFilters();

  if (cardId) {
    const card = state.cards.find(c=>c.id===cardId);
    if (!card) return;
    document.getElementById('fTitle').value = card.title||'';
    document.getElementById('fDesc').value  = card.desc||'';
    document.getElementById('fArea').value  = card.columnId||'';
    document.getElementById('fRole').value  = card.role||'';
    document.getElementById('fPerson').value= card.person||'';
    selectedCardTags = [...(card.tags||[])];
    selectedColor = card.color || COLORS[0];
  } else {
    document.getElementById('fTitle').value = '';
    document.getElementById('fDesc').value  = '';
    document.getElementById('fRole').value  = '';
    document.getElementById('fPerson').value= '';
    if (colId) document.getElementById('fArea').value = colId;
  }

  renderTagCheckboxes();
  renderColorGrid('colorGrid','card');
  document.getElementById('cardOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('fTitle').focus(),100);
};
window.closeCardModal = function() { document.getElementById('cardOverlay').classList.remove('open'); };

window.saveCard = function() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { toast("El título es obligatorio","err"); return; }
  const colId  = document.getElementById('fArea').value;
  const role   = document.getElementById('fRole').value;
  const person = document.getElementById('fPerson').value;
  const desc   = document.getElementById('fDesc').value.trim();

  if (editingCardId) {
    const card = state.cards.find(c=>c.id===editingCardId);
    Object.assign(card,{title,columnId:colId,role,person,desc,tags:selectedCardTags,color:selectedColor});
  } else {
    state.cards.push({id:uid(),title,columnId:colId,role,person,desc,tags:selectedCardTags,color:selectedColor});
  }
  closeCardModal(); scheduleSave(); render();
  toast(editingCardId?"✅ Ficha actualizada":"✅ Ficha creada","ok");
};

// Tag checkboxes in card modal
function renderTagCheckboxes() {
  const wrap = document.getElementById('tagCheckboxes');
  wrap.innerHTML = '';
  if (!state.tags.length) {
    wrap.innerHTML = '<span style="color:var(--text-mut);font-size:12px">Añade etiquetas en el panel ⚙ Maestros</span>';
    return;
  }
  state.tags.forEach(t => {
    const sel = selectedCardTags.includes(t.name);
    const tc  = t.color||'#64748b';
    const pill = document.createElement('div');
    pill.className = 'tag-pill';
    pill.style.cssText = `cursor:pointer;background:${sel?tc+'22':'var(--surface-alt)'};color:${sel?tc:'var(--text-sec)'};border-color:${sel?tc+'80':'var(--border)'};font-weight:${sel?'700':'500'}`;
    pill.innerHTML = `${sel?'✓ ':''}${esc(t.name)}`;
    pill.onclick = () => {
      if (sel) selectedCardTags = selectedCardTags.filter(x=>x!==t.name);
      else selectedCardTags.push(t.name);
      renderTagCheckboxes();
    };
    wrap.appendChild(pill);
  });
}

// =====================================================
// COLUMN MODAL
// =====================================================
window.openColModal = function(colId=null) {
  editingColId = colId;
  selectedColColor = colId?(state.columns.find(c=>c.id===colId)||{}).color||COLORS[6]:COLORS[6];
  document.getElementById('colModalTitle').textContent = colId?'Editar área':'Nueva área';
  document.getElementById('colName').value = colId?(state.columns.find(c=>c.id===colId)||{}).name||'':'';
  renderColorGrid('colColorGrid','col');
  document.getElementById('colOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('colName').focus(),100);
};
window.closeColModal = function() { document.getElementById('colOverlay').classList.remove('open'); };
window.saveColumn = function() {
  const name = document.getElementById('colName').value.trim();
  if (!name) { toast("El nombre es obligatorio","err"); return; }
  if (editingColId) { const col=state.columns.find(c=>c.id===editingColId); col.name=name; col.color=selectedColColor; }
  else { state.columns.push({id:uid(),name,color:selectedColColor,order:state.columns.length}); }
  closeColModal(); scheduleSave(); render();
  toast(editingColId?"✅ Área actualizada":"✅ Área creada","ok");
};

// =====================================================
// DELETE
// =====================================================
window.deleteCurrentCard = function() { if (!editingCardId) return; closeCardModal(); askDelete('card',editingCardId); };
window.askDelete = function(type, id) {
  document.getElementById('cardOverlay').classList.remove('open');
  document.getElementById('colOverlay').classList.remove('open');
  deleteTarget = {type,id};
  const isCard = type==='card';
  const name = isCard?(state.cards.find(c=>c.id===id)||{}).title:(state.columns.find(c=>c.id===id)||{}).name;
  document.getElementById('delMsg').textContent =
    `¿Seguro que quieres eliminar ${isCard?'la ficha':'el área'} "${name}"?${!isCard?' Se eliminarán también todas sus fichas.':''}`;
  document.getElementById('delOverlay').classList.add('open');
};
window.closeDelModal = function() { document.getElementById('delOverlay').classList.remove('open'); deleteTarget=null; };
window.confirmDelete = async function() {
  if (!deleteTarget) return;
  const {type,id} = deleteTarget;
  if (type==='card') {
    if (useFirebase) { try { await deleteDoc(doc(db,"cards",id)); } catch(e){} }
    state.cards = state.cards.filter(c=>c.id!==id);
  } else {
    const children = state.cards.filter(c=>c.columnId===id);
    if (useFirebase) {
      try { await deleteDoc(doc(db,"columns",id)); for(const c of children) await deleteDoc(doc(db,"cards",c.id)); } catch(e){}
    }
    state.columns = state.columns.filter(c=>c.id!==id);
    state.cards   = state.cards.filter(c=>c.columnId!==id);
  }
  closeDelModal(); scheduleSave(); render();
  toast("🗑 Eliminado","info");
};

// =====================================================
// PANEL MAESTROS
// =====================================================
window.openMaestro = function() {
  renderMaestroPanel();
  document.getElementById('maestroOverlay').classList.add('open');
};
window.closeMaestro = function() { document.getElementById('maestroOverlay').classList.remove('open'); };

function renderMaestroPanel() {
  renderMaestroList('roles','roleList');
  renderMaestroList('persons','personList');
  renderMaestroList('tags','tagList');
}

function renderMaestroList(type, listId) {
  const list = document.getElementById(listId);
  list.innerHTML = '';
  const items = state[type];
  if (!items.length) {
    list.innerHTML = `<div class="maestro-empty">Sin ${type==='roles'?'roles':type==='persons'?'responsables':'etiquetas'} todavía</div>`;
    return;
  }
  items.forEach(item => {
    // Count usage
    let count = 0;
    if (type==='roles')   count = state.cards.filter(c=>c.role===item.name).length;
    if (type==='persons') count = state.cards.filter(c=>c.person===item.name).length;
    if (type==='tags')    count = state.cards.filter(c=>(c.tags||[]).includes(item.name)).length;

    const div = document.createElement('div');
    div.className = 'maestro-item';
    div.innerHTML = `
      ${item.color?`<div class="maestro-item-color" style="background:${item.color}"></div>`:'<div style="width:12px;height:12px;border-radius:50%;background:var(--rm-blue);flex-shrink:0"></div>'}
      <div class="maestro-item-name">${esc(item.name)}${type==='persons'&&item.role?`<span style="color:var(--text-mut);font-size:11px;margin-left:6px">${esc(item.role)}</span>`:''}</div>
      <span class="maestro-item-count">${count} ficha${count!==1?'s':''}</span>
      <button class="maestro-item-del" onclick="deleteMaestroItem('${type}','${item.id}')" title="Eliminar">×</button>`;
    list.appendChild(div);
  });
}

window.addMaestroItem = function(type) {
  let name, extra = {};
  if (type==='roles') {
    name = document.getElementById('newRoleName').value.trim();
    if (!name) { toast("Escribe un nombre","err"); return; }
    document.getElementById('newRoleName').value = '';
  } else if (type==='persons') {
    name = document.getElementById('newPersonName').value.trim();
    const role = document.getElementById('newPersonRole').value.trim();
    if (!name) { toast("Escribe un nombre","err"); return; }
    extra = {role};
    document.getElementById('newPersonName').value = '';
    document.getElementById('newPersonRole').value = '';
  } else if (type==='tags') {
    name = document.getElementById('newTagName').value.trim();
    if (!name) { toast("Escribe un nombre","err"); return; }
    extra = {color: selectedTagColor};
    document.getElementById('newTagName').value = '';
  }

  if (state[type].find(x=>x.name.toLowerCase()===name.toLowerCase())) {
    toast("Ya existe ese elemento","err"); return;
  }
  state[type].push({id:uid(), name, ...extra});
  scheduleSave();
  renderMaestroPanel();
  updateAllFilters();
  toast("✅ Añadido","ok");
};

window.deleteMaestroItem = function(type, id) {
  const item = state[type].find(x=>x.id===id);
  if (!item) return;
  let inUse = 0;
  if (type==='roles')   inUse = state.cards.filter(c=>c.role===item.name).length;
  if (type==='persons') inUse = state.cards.filter(c=>c.person===item.name).length;
  if (type==='tags')    inUse = state.cards.filter(c=>(c.tags||[]).includes(item.name)).length;

  if (inUse > 0) {
    toast(`En uso en ${inUse} ficha${inUse!==1?'s':''}. Edítalas primero.`,"err");
    return;
  }
  state[type] = state[type].filter(x=>x.id!==id);
  if (useFirebase) deleteDoc(doc(db,type,id)).catch(()=>{});
  scheduleSave();
  renderMaestroPanel();
  updateAllFilters();
  toast("🗑 Eliminado","info");
};

function renderMiniTagColors() {
  const wrap = document.getElementById('tagColorMini');
  if (!wrap) return;
  wrap.innerHTML = '';
  COLORS.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'mini-swatch' + (c===selectedTagColor?' selected':'');
    sw.style.background = c;
    sw.onclick = () => { selectedTagColor=c; renderMiniTagColors(); };
    wrap.appendChild(sw);
  });
}

// =====================================================
// FILTERS
// =====================================================
window.filterCards    = q => { searchQuery=q; render(); };
window.filterByArea   = v => { filterArea=v; render(); };
window.filterByRole   = v => { filterRole=v; render(); };
window.filterByPerson = v => { filterPerson=v; render(); };
window.filterByTag    = v => { filterTag=v; render(); };

// =====================================================
// VIEW
// =====================================================
window.setView = function(v) {
  currentView=v;
  document.getElementById('board').style.display = v==='board'?'flex':'none';
  document.getElementById('listView').style.display = v==='list'?'block':'none';
  document.getElementById('vBoard').classList.toggle('active',v==='board');
  document.getElementById('vList').classList.toggle('active',v==='list');
  if (v==='list') renderList();
};

// =====================================================
// COLOR GRID
// =====================================================
function renderColorGrid(gridId, type) {
  const grid = document.getElementById(gridId);
  grid.innerHTML = '';
  const sel = type==='card'?selectedColor:selectedColColor;
  COLORS.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch'+(c===sel?' selected':'');
    sw.style.background = c;
    sw.onclick = () => { if(type==='card') selectedColor=c; else selectedColColor=c; renderColorGrid(gridId,type); };
    grid.appendChild(sw);
  });
}

// =====================================================
// DARK MODE
// =====================================================
window.toggleDark = function() {
  document.body.classList.toggle('dark');
  const isDark = document.body.classList.contains('dark');
  document.getElementById('darkBtn').innerHTML = isDark?'☀':'☾';
  localStorage.setItem('rm_roles_dark', isDark?'1':'0');
};

function initDarkMode() {
  const saved = localStorage.getItem('rm_roles_dark');
  if (saved === '1') {
    document.body.classList.add('dark');
    document.getElementById('darkBtn').innerHTML = '☀';
  }
}

// =====================================================
// SEASON PICKER
// =====================================================
const DEFAULT_SEASONS = ['2023/2024','2024/2025','2025/2026','2026/2027','2027/2028'];

function getSeasons() {
  const saved = localStorage.getItem('rm_roles_seasons');
  return saved ? JSON.parse(saved) : [...DEFAULT_SEASONS];
}
function getActiveSeason() {
  return localStorage.getItem('rm_roles_active_season') || '2025/2026';
}
function saveSeasons(seasons) {
  localStorage.setItem('rm_roles_seasons', JSON.stringify(seasons));
}

window.openSeasonPicker = function() {
  renderSeasonList();
  document.getElementById('seasonOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('newSeasonInput').focus(), 100);
};
window.closeSeasonPicker = function() {
  document.getElementById('seasonOverlay').classList.remove('open');
};
window.addSeason = function() {
  const val = document.getElementById('newSeasonInput').value.trim();
  if (!val) { toast('Escribe una temporada','err'); return; }
  const seasons = getSeasons();
  if (seasons.includes(val)) { toast('Ya existe','err'); return; }
  seasons.push(val);
  saveSeasons(seasons);
  setActiveSeason(val);
  document.getElementById('newSeasonInput').value = '';
  renderSeasonList();
  toast('✅ Temporada añadida y activada','ok');
};
function setActiveSeason(season) {
  localStorage.setItem('rm_roles_active_season', season);
  document.getElementById('seasonDisplay').textContent = 'Formación · ' + season;
}
window.deleteSeason = function(season) {
  const seasons = getSeasons().filter(s=>s!==season);
  saveSeasons(seasons);
  if (getActiveSeason()===season) setActiveSeason(seasons[seasons.length-1]||'2025/2026');
  renderSeasonList();
  toast('🗑 Temporada eliminada','info');
};
function renderSeasonList() {
  const list = document.getElementById('seasonList');
  const seasons = getSeasons();
  const active = getActiveSeason();
  list.innerHTML = '';
  seasons.forEach(s => {
    const isActive = s === active;
    const div = document.createElement('div');
    div.style.cssText = 'display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface-alt);cursor:pointer;transition:all .15s;';
    if (isActive) div.style.cssText += 'border-color:var(--rm-blue);background:var(--rm-blue-bg);';
    div.innerHTML = `
      <span style="font-size:15px">${isActive?'✅':'⚽'}</span>
      <span style="flex:1;font-size:13px;font-weight:${isActive?'700':'500'};color:${isActive?'var(--rm-blue)':'var(--text)'}">${esc(s)}</span>
      ${isActive?'<span style="font-size:10px;font-weight:700;color:var(--rm-blue);background:var(--rm-blue-bg);padding:2px 8px;border-radius:20px;border:1px solid var(--rm-blue)">ACTIVA</span>':''}
      ${!isActive?`<button onclick="event.stopPropagation();deleteSeason('${s}')" style="width:20px;height:20px;border:none;background:transparent;cursor:pointer;color:var(--text-mut);font-size:14px;display:flex;align-items:center;justify-content:center;border-radius:4px;" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--text-mut)'">×</button>`:''}
    `;
    if (!isActive) div.onclick = () => { setActiveSeason(s); renderSeasonList(); closeSeasonPicker(); toast('📅 Temporada '+s+' activada','ok'); };
    list.appendChild(div);
  });
}

// =====================================================
// HELPERS
// =====================================================
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg,type='info') {
  const wrap=document.getElementById('toastWrap');
  const t=document.createElement('div');
  t.className=`toast ${type}`; t.textContent=msg;
  wrap.appendChild(t); setTimeout(()=>t.remove(),3000);
}
function setSaveDot(st,label) {
  document.getElementById('saveDot').className='save-dot'+(st!=='ok'?' '+st:'');
  document.getElementById('saveLabel').textContent=label;
}
function setFooterStatus(msg) { const el=document.getElementById('footerStatus'); if(el) el.textContent='· '+msg; }

window.onDragOver=onDragOver; window.onDragLeave=onDragLeave; window.onDrop=onDrop;
</script>
